<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Ranky Form | Staff Application</title>
    <link rel="icon" href="/formulary.ico" type="image/x-icon">
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit" async defer></script>
    <script src="https://www.google.com/recaptcha/api.js?render=explicit" async defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-body: #f1f5f9;
            --bg-card: #ffffff;
            --text-primary: #0f172a;
            --text-secondary: #334155;
            --border-light: #e2e8f0;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --btn-bg: #1e293b;
            --btn-hover: #0f172a;
            --error: #dc2626;
            --success: #22c55e;
        }
        body.dark {
            --bg-body: #0f172a;
            --bg-card: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --border-light: #334155;
            --accent: #60a5fa;
            --accent-hover: #3b82f6;
            --btn-bg: #334155;
            --btn-hover: #475569;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-body);
            color: var(--text-primary);
            padding: 2rem 1rem;
            transition: background 0.2s, color 0.2s;
            min-height: 100vh;
        }
        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .main-card {
            background: var(--bg-card);
            border-radius: 1.75rem;
            max-width: 1000px;
            margin: 0 auto;
            border: 1px solid var(--border-light);
            animation: fadeSlide 0.5s ease;
            overflow: hidden;
        }
        .hero-section {
            background: var(--bg-card);
            padding: 2rem;
            text-align: center;
            border-bottom: 1px solid var(--border-light);
        }
        .hero-section h1 {
            font-weight: 700;
            font-size: clamp(1.8rem, 5vw, 2.5rem);
            color: var(--text-primary);
        }
        .hero-section p {
            color: var(--text-secondary);
            font-size: 0.85rem;
            margin-top: 0.5rem;
        }
        .section-label {
            font-weight: 600;
            font-size: 1rem;
            border-left: 3px solid var(--accent);
            padding-left: 1rem;
            margin: 2rem 0 1.5rem 0;
            color: var(--text-secondary);
        }
        .form-label {
            font-weight: 600;
            font-size: 0.85rem;
            margin-bottom: 0.5rem;
            display: block;
            color: var(--text-secondary);
        }
        .form-control, .form-select {
            background: var(--bg-card);
            border: 1.5px solid var(--border-light);
            border-radius: 1rem;
            padding: 0.75rem 1rem;
            width: 100%;
            color: var(--text-primary);
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        .form-control:focus, .form-select:focus {
            border-color: var(--accent);
            outline: none;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
        }
        textarea.form-control {
            resize: vertical;
        }
        .btn-submit {
            background: var(--btn-bg);
            border: none;
            padding: 0.9rem;
            border-radius: 2rem;
            font-weight: 700;
            font-size: 1rem;
            width: 100%;
            margin-top: 2rem;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-submit:hover:not(:disabled) {
            background: var(--btn-hover);
            transform: translateY(-2px);
        }
        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .captcha-box {
            background: var(--bg-card);
            border-radius: 1.25rem;
            padding: 1.5rem;
            margin-top: 2rem;
            border: 1px solid var(--border-light);
            text-align: center;
        }
        .captcha-status {
            margin-top: 0.75rem;
            font-size: 0.8rem;
        }
        .captcha-status.success { color: var(--success); }
        .captcha-status.error { color: var(--error); }
        .captcha-status.warning { color: #f59e0b; }
        
        /* Menu lateral */
        .menu-corner {
            position: fixed;
            top: 1rem;
            left: 1rem;
            z-index: 1000;
        }
        .menu-btn {
            background: var(--bg-card);
            border: 1px solid var(--border-light);
            padding: 0.5rem 1.2rem;
            border-radius: 2rem;
            cursor: pointer;
            font-weight: 600;
            color: var(--text-primary);
            backdrop-filter: blur(4px);
            transition: 0.2s;
        }
        .menu-btn:hover {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }
        .sidebar-menu {
            position: fixed;
            top: 0;
            left: -280px;
            width: 280px;
            height: 100%;
            background: var(--bg-card);
            z-index: 1001;
            transition: left 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            padding: 2rem 1.5rem;
            border-right: 1px solid var(--border-light);
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }
        .sidebar-menu.open { left: 0; }
        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(3px);
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
        }
        .menu-overlay.active { visibility: visible; opacity: 1; }
        .close-sidebar {
            background: none;
            border: none;
            font-size: 1.5rem;
            align-self: flex-end;
            cursor: pointer;
            color: var(--text-secondary);
        }
        .menu-title {
            font-weight: 700;
            font-size: 1.3rem;
            border-bottom: 2px solid var(--border-light);
            padding-bottom: 0.5rem;
        }
        .menu-item {
            padding: 0.7rem 0;
            cursor: pointer;
            border-bottom: 1px solid var(--border-light);
            font-weight: 500;
            transition: 0.15s;
        }
        .menu-item:hover {
            color: var(--accent);
            transform: translateX(5px);
        }
        .external-btn {
            display: block;
            padding: 0.7rem;
            text-align: center;
            background: var(--bg-body);
            border-radius: 1rem;
            text-decoration: none;
            color: var(--text-primary);
            font-weight: 500;
            border: 1px solid var(--border-light);
            transition: 0.15s;
        }
        .external-btn:hover {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }
        .lang-row {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }
        .lang-row button {
            flex: 1;
            padding: 0.5rem;
            border-radius: 2rem;
            background: var(--bg-body);
            border: 1px solid var(--border-light);
            cursor: pointer;
            font-weight: 500;
        }
        .lang-row button:hover {
            background: var(--accent);
            color: white;
        }
        .theme-switch {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 0.8rem;
            background: var(--bg-body);
            border-radius: 2rem;
            margin-top: 0.5rem;
        }
        .toggle-switch {
            width: 48px;
            height: 24px;
            background: var(--border-light);
            border-radius: 50px;
            position: relative;
            cursor: pointer;
        }
        .toggle-switch::after {
            content: "";
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
            position: absolute;
            top: 2px;
            left: 3px;
            transition: 0.2s;
        }
        body.dark .toggle-switch::after { left: 25px; background: #0f172a; }
        .credits-footer {
            font-size: 0.7rem;
            text-align: center;
            color: var(--text-secondary);
            margin-top: auto;
        }
        /* Modal éxito */
        #successModal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(12px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        .modal-card {
            background: var(--bg-card);
            max-width: 400px;
            width: 90%;
            border-radius: 1.5rem;
            padding: 2rem;
            text-align: center;
            animation: fadeSlide 0.3s ease;
        }
        .contact-email {
            background: var(--bg-body);
            padding: 0.5rem;
            border-radius: 1rem;
            margin: 1rem 0;
            font-weight: 600;
            color: var(--accent);
            font-family: monospace;
        }
        .row { display: flex; flex-wrap: wrap; gap: 1rem; margin-bottom: 1rem; }
        .col-md-6 { flex: 1; min-width: 200px; }
        .col-md-4 { flex: 1; min-width: 150px; }
        .col-12 { width: 100%; }
        @media (max-width: 640px) {
            body { padding: 1rem; }
            .row { flex-direction: column; gap: 0.8rem; }
        }
    </style>
</head>
<body>

<div class="menu-corner">
    <button class="menu-btn" id="menuBtn">☰ Menú</button>
</div>

<div class="sidebar-menu" id="sidebar">
    <button class="close-sidebar" id="closeSidebarBtn">✕</button>
    <div class="menu-title" id="menuTitle">Menú</div>
    <div class="menu-item" id="backToRootItem">🏠 Back to Root</div>
    <a href="https://quasvx.pages.dev" target="_blank" class="external-btn">⚡ Quasvx</a>
    <div class="theme-switch">
        <span id="themeLabel">🌙 Modo oscuro</span>
        <div class="toggle-switch" id="themeToggle"></div>
    </div>
    <div class="lang-row">
        <button id="langEsBtn">🇪🇸 ES</button>
        <button id="langEnBtn">🇬🇧 EN</button>
    </div>
    <div class="credits-footer">Ranky Form • Staff Application</div>
</div>
<div class="menu-overlay" id="menuOverlay"></div>

<div class="main-card">
    <div class="hero-section">
        <h1 id="title">Ranky Form</h1>
        <p id="subtitle">Staff Application 2026</p>
    </div>
    <div class="p-4">
        <form id="appForm">
            <!-- Sección 1 -->
            <div class="section-label" id="sec1">📋 01. Datos personales</div>
            <div class="row">
                <div class="col-md-6">
                    <label class="form-label" id="lDiscord">Discord *</label>
                    <input type="text" id="discord" class="form-control" placeholder="usuario#0000" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label" id="lEmail">Correo electrónico *</label>
                    <input type="email" id="email" class="form-control" placeholder="tu@email.com" required>
                </div>
            </div>

            <!-- Sección 2 -->
            <div class="section-label" id="sec2">🛠️ 02. Perfil profesional</div>
            <div class="row">
                <div class="col-md-6">
                    <label class="form-label" id="lRole">Rol principal *</label>
                    <select id="role" class="form-select" required>
                        <option value="" disabled selected id="optSelect">Seleccionar</option>
                        <option value="Coder" id="optCoder">Desarrollador/a</option>
                        <option value="Artist" id="optArtist">Artista gráfico</option>
                        <option value="Musician" id="optMusic">Compositor/a</option>
                        <option value="Charter" id="optChart">Charter</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label" id="lTools">Herramientas principales *</label>
                    <input type="text" id="software" class="form-control" placeholder="Ej: Photoshop, Unity, FL Studio" required>
                </div>
            </div>
            <div class="row">
                <div class="col-md-4">
                    <label class="form-label" id="lAge">Edad *</label>
                    <input type="number" id="age" class="form-control" min="13" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label" id="lHours">Horas semanales *</label>
                    <input type="number" id="hours" class="form-control" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label" id="lSkill">Nivel (0-100) *</label>
                    <input type="number" id="skill" class="form-control" min="0" max="100" required>
                </div>
            </div>

            <!-- Sección 3 -->
            <div class="section-label" id="sec3">✨ 03. Motivación y experiencia</div>
            <div class="row">
                <div class="col-12">
                    <label class="form-label" id="lPortfolio">Portafolio / GitHub *</label>
                    <input type="url" id="portfolio" class="form-control" placeholder="https://github.com/tuusuario" required>
                </div>
            </div>
            <div class="row">
                <div class="col-12">
                    <label class="form-label" id="lExperience">Experiencia previa *</label>
                    <textarea id="experience" class="form-control" rows="2" placeholder="Cuéntanos tu experiencia relevante..." required></textarea>
                </div>
            </div>
            <div class="row">
                <div class="col-12">
                    <label class="form-label" id="lMotivation">¿Por qué quieres unirte a Ranky? *</label>
                    <textarea id="motivation" class="form-control" rows="3" placeholder="Tu motivación, tus metas, qué puedes aportar..." required></textarea>
                </div>
            </div>
            <div class="row">
                <div class="col-12">
                    <label class="form-label" id="lConflict">Ejemplo de resolución de conflictos *</label>
                    <textarea id="conflict" class="form-control" rows="2" placeholder="Describe cómo manejas desacuerdos o problemas en equipo..." required></textarea>
                </div>
            </div>
            <div class="row">
                <div class="col-12">
                    <label class="form-label" id="lFuture">Meta a 1 año *</label>
                    <textarea id="future" class="form-control" rows="2" placeholder="¿Dónde te ves en un año dentro del proyecto?" required></textarea>
                </div>
            </div>

            <!-- Captcha -->
            <div class="captcha-box">
                <label class="form-label" id="verifyLabel">🔐 Verificación de seguridad</label>
                <div id="turnstileContainer" class="d-flex justify-content-center"></div>
                <div id="recaptchaContainer" style="display:none" class="d-flex justify-content-center"></div>
                <div id="captchaStatus" class="captcha-status"></div>
            </div>
            <div id="securityAlert" style="color:var(--error); margin-top:1rem; display:none; text-align:center; font-size:0.85rem;"></div>
            <button type="submit" class="btn-submit" id="submitBtn" disabled>📤 Enviar solicitud</button>
        </form>
    </div>
</div>

<div id="successModal">
    <div class="modal-card">
        <div style="font-size:3rem;">✅</div>
        <h3 id="modalTitle">Solicitud enviada</h3>
        <div id="modalMessage"></div>
        <button onclick="closeModal()" class="btn-submit" style="margin-top:1rem;">Cerrar</button>
    </div>
</div>

<script>
    // --- Cookies ---
    function setCookie(name, value, days = 365) {
        let expires = "";
        if (days) { let d = new Date(); d.setTime(d.getTime() + days*24*60*60*1000); expires = "; expires=" + d.toUTCString(); }
        document.cookie = name + "=" + (value || "") + expires + "; path=/";
    }
    function getCookie(name) {
        let match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
        return match ? match[2] : null;
    }

    // --- Bloqueo temporal (10 minutos) ---
    function isBlocked() {
        let blocked = getCookie('ranky_blocked');
        if (blocked && parseInt(blocked) > Date.now()) return true;
        return false;
    }
    function setBlocked() {
        setCookie('ranky_blocked', Date.now() + 600000, 0.01);
    }

    // --- Captcha: 3 intentos Turnstile -> reCAPTCHA -> bloqueo ---
    let turnstileAttempts = 0;
    let turnstileWidget = null;
    let currentStage = 'turnstile'; // 'turnstile', 'recaptcha'
    let recaptchaWidget = null;
    let captchaToken = null;

    const TURNSTILE_KEY = "1x00000000000000000000AA";  // test key (funciona local)
    const RECAPTCHA_KEY = "6LeIxAcTAAAAAJcZVRqyHh71UMIEGNQ_MXjiZKhI"; // test key

    function updateStatus(msg, type) {
        let statusDiv = document.getElementById('captchaStatus');
        statusDiv.innerHTML = msg;
        statusDiv.className = 'captcha-status ' + type;
        setTimeout(() => {
            if (statusDiv.innerHTML === msg) statusDiv.innerHTML = '';
        }, 5000);
    }

    function turnstileSuccess(token) {
        captchaToken = token;
        turnstileAttempts = 0;
        updateStatus('✅ Verificación exitosa', 'success');
        document.getElementById('submitBtn').disabled = false;
    }

    function turnstileError() {
        turnstileAttempts++;
        updateStatus(`⚠️ Error en Turnstile (intento ${turnstileAttempts}/3)`, 'error');
        if (turnstileAttempts >= 3) {
            updateStatus('🔄 Cambiando a reCAPTCHA...', 'warning');
            switchToRecaptcha();
        } else {
            if (turnstileWidget) turnstile.reset(turnstileWidget);
            document.getElementById('submitBtn').disabled = true;
            captchaToken = null;
        }
    }

    function renderTurnstile() {
        if (turnstileWidget) { try { turnstile.reset(turnstileWidget); } catch(e) {} }
        turnstileWidget = turnstile.render('#turnstileContainer', {
            sitekey: TURNSTILE_KEY,
            callback: turnstileSuccess,
            'error-callback': turnstileError,
            'expired-callback': () => {
                captchaToken = null;
                document.getElementById('submitBtn').disabled = true;
                updateStatus('Captcha expirado, resuelve de nuevo', 'error');
            }
        });
    }

    function recaptchaSuccess(token) {
        captchaToken = token;
        updateStatus('✅ Verificación exitosa (reCAPTCHA)', 'success');
        document.getElementById('submitBtn').disabled = false;
    }

    function recaptchaError() {
        updateStatus('❌ reCAPTCHA falló. Has sido bloqueado por 10 minutos.', 'error');
        setBlocked();
        document.getElementById('submitBtn').disabled = true;
        document.getElementById('turnstileContainer').style.display = 'none';
        document.getElementById('recaptchaContainer').style.display = 'none';
    }

    function switchToRecaptcha() {
        if (currentStage === 'recaptcha') return;
        currentStage = 'recaptcha';
        document.getElementById('turnstileContainer').style.display = 'none';
        document.getElementById('recaptchaContainer').style.display = 'flex';
        try {
            if (recaptchaWidget) grecaptcha.reset(recaptchaWidget);
            recaptchaWidget = grecaptcha.render('recaptchaContainer', {
                sitekey: RECAPTCHA_KEY,
                callback: recaptchaSuccess,
                'expired-callback': () => {
                    captchaToken = null;
                    document.getElementById('submitBtn').disabled = true;
                    updateStatus('reCAPTCHA expirado', 'error');
                },
                'error-callback': recaptchaError
            });
        } catch(e) {
            recaptchaError();
        }
    }

    function initCaptcha() {
        if (isBlocked()) {
            updateStatus('🚫 Acceso bloqueado por 10 minutos. Intenta más tarde.', 'error');
            document.getElementById('submitBtn').disabled = true;
            return;
        }
        currentStage = 'turnstile';
        turnstileAttempts = 0;
        document.getElementById('turnstileContainer').style.display = 'flex';
        document.getElementById('recaptchaContainer').style.display = 'none';
        renderTurnstile();
    }

    // --- Tema claro/oscuro ---
    function initTheme() {
        let saved = getCookie('theme');
        let dark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (saved === 'dark' || (!saved && dark)) document.body.classList.add('dark');
        else document.body.classList.remove('dark');
    }
    function toggleTheme() {
        if (document.body.classList.contains('dark')) {
            document.body.classList.remove('dark');
            setCookie('theme', 'light');
        } else {
            document.body.classList.add('dark');
            setCookie('theme', 'dark');
        }
    }
    document.getElementById('themeToggle').addEventListener('click', toggleTheme);

    // --- Traducciones (completas) ---
    const texts = {
        en: {
            menuTitle: "Menu", backToRoot: "🏠 Back to Root", themeLabel: "🌙 Dark mode",
            title: "Ranky Form", subtitle: "Staff Application 2026",
            sec1: "📋 01. Personal info", sec2: "🛠️ 02. Professional profile", sec3: "✨ 03. Motivation & experience",
            lDiscord: "Discord *", lEmail: "Email *", lRole: "Main role *", optSelect: "Select",
            optCoder: "Developer", optArtist: "Graphic Artist", optMusic: "Composer", optChart: "Charter",
            lTools: "Main tools *", lAge: "Age *", lHours: "Weekly hours *", lSkill: "Skill level (0-100) *",
            lPortfolio: "Portfolio / GitHub *", lExperience: "Previous experience *", lMotivation: "Why join Ranky? *",
            lConflict: "Conflict resolution example *", lFuture: "1-year goal *", verifyLabel: "🔐 Verification",
            submitBtn: "📤 Submit application", modalTitle: "Application sent",
            modalTextValid: "We will contact you from:", modalTextInvalid: "⚠️ Invalid email address. We cannot contact you.",
            contactEmail: "quasvx@outlook.es",
            errors: { mouse: "⚠️ Move your mouse or interact with the page first.", speed: "⚠️ Form sent too quickly. Please wait a few seconds.", paste: "⚠️ Excessive copy-paste detected. Type naturally." }
        },
        es: {
            menuTitle: "Menú", backToRoot: "🏠 Volver al Inicio", themeLabel: "🌙 Modo oscuro",
            title: "Ranky Form", subtitle: "Solicitud de Staff 2026",
            sec1: "📋 01. Datos personales", sec2: "🛠️ 02. Perfil profesional", sec3: "✨ 03. Motivación y experiencia",
            lDiscord: "Discord *", lEmail: "Correo electrónico *", lRole: "Rol principal *", optSelect: "Seleccionar",
            optCoder: "Desarrollador/a", optArtist: "Artista gráfico", optMusic: "Compositor/a", optChart: "Charter",
            lTools: "Herramientas principales *", lAge: "Edad *", lHours: "Horas semanales *", lSkill: "Nivel (0-100) *",
            lPortfolio: "Portafolio / GitHub *", lExperience: "Experiencia previa *", lMotivation: "¿Por qué unirte a Ranky? *",
            lConflict: "Ejemplo de resolución de conflictos *", lFuture: "Meta a 1 año *", verifyLabel: "🔐 Verificación",
            submitBtn: "📤 Enviar solicitud", modalTitle: "Solicitud enviada",
            modalTextValid: "Te contactaremos en los próximos días desde:", modalTextInvalid: "⚠️ No ingresaste un email válido. No podemos contactarte.",
            contactEmail: "quasvx@outlook.es",
            errors: { mouse: "⚠️ Mueve el ratón o interactúa con la página primero.", speed: "⚠️ Envío demasiado rápido. Espera unos segundos.", paste: "⚠️ Evita copiar y pegar en exceso. Escribe normalmente." }
        }
    };
    let currentLang = 'es';
    function applyLanguage(lang) {
        currentLang = lang;
        setCookie('lang', lang);
        const t = texts[lang];
        document.getElementById('menuTitle').innerText = t.menuTitle;
        document.getElementById('backToRootItem').innerHTML = t.backToRoot;
        document.getElementById('themeLabel').innerHTML = t.themeLabel;
        document.getElementById('title').innerText = t.title;
        document.getElementById('subtitle').innerText = t.subtitle;
        document.getElementById('sec1').innerText = t.sec1;
        document.getElementById('sec2').innerText = t.sec2;
        document.getElementById('sec3').innerText = t.sec3;
        document.getElementById('lDiscord').innerText = t.lDiscord;
        document.getElementById('lEmail').innerText = t.lEmail;
        document.getElementById('lRole').innerText = t.lRole;
        document.getElementById('optSelect').innerText = t.optSelect;
        document.getElementById('optCoder').innerText = t.optCoder;
        document.getElementById('optArtist').innerText = t.optArtist;
        document.getElementById('optMusic').innerText = t.optMusic;
        document.getElementById('optChart').innerText = t.optChart;
        document.getElementById('lTools').innerText = t.lTools;
        document.getElementById('lAge').innerText = t.lAge;
        document.getElementById('lHours').innerText = t.lHours;
        document.getElementById('lSkill').innerText = t.lSkill;
        document.getElementById('lPortfolio').innerText = t.lPortfolio;
        document.getElementById('lExperience').innerText = t.lExperience;
        document.getElementById('lMotivation').innerText = t.lMotivation;
        document.getElementById('lConflict').innerText = t.lConflict;
        document.getElementById('lFuture').innerText = t.lFuture;
        document.getElementById('verifyLabel').innerHTML = t.verifyLabel;
        document.getElementById('submitBtn').innerHTML = t.submitBtn;
        document.getElementById('modalTitle').innerText = t.modalTitle;
        document.getElementById('menuBtn').innerHTML = lang === 'es' ? '☰ Menú' : '☰ Menu';
    }

    // --- Menú lateral ---
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('menuOverlay');
    function openMenu() { sidebar.classList.add('open'); overlay.classList.add('active'); }
    function closeMenu() { sidebar.classList.remove('open'); overlay.classList.remove('active'); }
    document.getElementById('menuBtn').addEventListener('click', openMenu);
    document.getElementById('closeSidebarBtn').addEventListener('click', closeMenu);
    overlay.addEventListener('click', closeMenu);
    document.getElementById('backToRootItem').addEventListener('click', () => {
        window.location.href = 'https://ranky.pages.dev';
    });
    document.getElementById('langEsBtn').addEventListener('click', () => applyLanguage('es'));
    document.getElementById('langEnBtn').addEventListener('click', () => applyLanguage('en'));

    // --- Envío del formulario ---
    let mouseMoves = 0, pasteCount = 0, startTime = Date.now();
    document.addEventListener('mousemove', () => mouseMoves++);
    document.querySelectorAll('input, textarea').forEach(el => el.addEventListener('paste', () => pasteCount++));

    function isValidEmail(email) {
        return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }

    function closeModal() {
        document.getElementById('successModal').style.display = 'none';
    }
    window.closeModal = closeModal;

    document.getElementById('appForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        if (isBlocked()) {
            updateStatus('🚫 Bloqueado por 10 minutos. Espera.', 'error');
            return;
        }
        
        const elapsed = (Date.now() - startTime) / 1000;
        const t = texts[currentLang];
        const alertDiv = document.getElementById('securityAlert');
        
        if (mouseMoves < 3) {
            alertDiv.innerText = t.errors.mouse;
            alertDiv.style.display = 'block';
            setTimeout(() => alertDiv.style.display = 'none', 3000);
            return;
        }
        if (elapsed < 5) {
            alertDiv.innerText = t.errors.speed;
            alertDiv.style.display = 'block';
            setTimeout(() => alertDiv.style.display = 'none', 3000);
            return;
        }
        if (pasteCount > 5) {
            alertDiv.innerText = t.errors.paste;
            alertDiv.style.display = 'block';
            setTimeout(() => alertDiv.style.display = 'none', 3000);
            return;
        }
        if (!captchaToken) {
            alertDiv.innerText = "Completa el captcha primero.";
            alertDiv.style.display = 'block';
            setTimeout(() => alertDiv.style.display = 'none', 3000);
            return;
        }
        
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerText = "...";
        
        try {
            const formData = {
                discord: document.getElementById('discord').value,
                email: document.getElementById('email').value,
                role: document.getElementById('role').value,
                software: document.getElementById('software').value,
                age: document.getElementById('age').value,
                hours: document.getElementById('hours').value,
                skill: document.getElementById('skill').value,
                portfolio: document.getElementById('portfolio').value,
                experience: document.getElementById('experience').value,
                motivation: document.getElementById('motivation').value,
                conflict: document.getElementById('conflict').value,
                future: document.getElementById('future').value,
                lang: currentLang
            };
            
            const res = await fetch('https://ranky-api.pages.dev/api/api', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    type: 'form',
                    turnstileToken: captchaToken,
                    isFallback: (currentStage === 'recaptcha'),
                    formData: formData
                })
            });
            
            const data = await res.json();
            
            if (data.success) {
                const modalMsg = document.getElementById('modalMessage');
                const userEmail = document.getElementById('email').value;
                if (isValidEmail(userEmail)) {
                    modalMsg.innerHTML = `<p>${t.modalTextValid}</p><div class="contact-email">${t.contactEmail}</div><p>✅ Hemos recibido: <strong>${userEmail}</strong></p>`;
                } else {
                    modalMsg.innerHTML = `<p>${t.modalTextInvalid}</p>`;
                }
                document.getElementById('successModal').style.display = 'flex';
            } else {
                alert("Error en el envío. Intenta de nuevo.");
                if (data.blocked) setBlocked();
            }
        } catch (err) {
            console.error(err);
            alert("Error de red. Revisa tu conexión.");
        } finally {
            btn.disabled = false;
            btn.innerText = texts[currentLang].submitBtn;
        }
    });

    // --- Inicialización ---
    initTheme();
    const savedLang = getCookie('lang');
    applyLanguage(savedLang === 'en' ? 'en' : 'es');
    initCaptcha();
</script>
</body>
</html>

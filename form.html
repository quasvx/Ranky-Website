<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' https:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://challenges.cloudflare.com https://www.google.com https://www.gstatic.com; frame-src 'self' https://challenges.cloudflare.com https://www.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://challenges.cloudflare.com https://ranky-api.pages.dev https://cdn.jsdelivr.net;">
    <title>Ranky Form</title>
    <link rel="icon" href="/formulary.ico" type="image/x-icon">
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit" async defer></script>
    <script src="https://www.google.com/recaptcha/api.js?render=explicit" async defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* TEMAS (claro/oscuro) */
        :root {
            --bg-body: #f1f5f9;
            --bg-card: #ffffff;
            --text-primary: #0f172a;
            --text-secondary: #334155;
            --text-muted: #64748b;
            --border-light: #e2e8f0;
            --border-focus: #3b82f6;
            --accent: #3b82f6;
            --accent-soft: #dbeafe;
            --hero-bg: #f8fafc;
            --input-bg: #ffffff;
            --placeholder: #94a3b8;
            --shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.08);
            --btn-bg: #1e293b;
            --btn-hover: #0f172a;
            --captcha-bg: #f8fafc;
            --sidebar-bg: rgba(255, 255, 255, 0.98);
            --overlay: rgba(0, 0, 0, 0.25);
            --transition: 0.2s ease;
        }

        body.dark {
            --bg-body: #0f172a;
            --bg-card: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --text-muted: #94a3b8;
            --border-light: #334155;
            --border-focus: #60a5fa;
            --accent: #60a5fa;
            --accent-soft: #1e293b;
            --hero-bg: #111827;
            --input-bg: #0f172a;
            --placeholder: #64748b;
            --shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.4);
            --btn-bg: #334155;
            --btn-hover: #475569;
            --captcha-bg: #0f172a;
            --sidebar-bg: rgba(30, 41, 59, 0.98);
            --overlay: rgba(0, 0, 0, 0.5);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-body);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 2rem 1rem;
            transition: background var(--transition), color var(--transition);
        }

        /* Animación de entrada suave */
        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .main-card {
            background: var(--bg-card);
            border-radius: 1.75rem;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-light);
            overflow: hidden;
            animation: fadeSlideUp 0.6s cubic-bezier(0.2, 0.9, 0.4, 1.1) forwards;
            transition: background var(--transition), border-color var(--transition);
        }

        .hero-section {
            background: var(--hero-bg);
            padding: 2rem 2rem;
            text-align: center;
            border-bottom: 1px solid var(--border-light);
        }

        .hero-section h1 {
            font-weight: 700;
            font-size: clamp(1.8rem, 5vw, 2.5rem);
            color: var(--text-primary);
            letter-spacing: -0.3px;
        }

        .hero-section p {
            color: var(--text-muted);
            font-weight: 500;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 0.5rem;
        }

        .section-label {
            font-weight: 600;
            font-size: 1rem;
            color: var(--text-secondary);
            border-left: 3px solid var(--accent);
            padding-left: 0.9rem;
            margin: 2rem 0 1.5rem 0;
        }

        .form-label {
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .form-control, .form-select {
            background: var(--input-bg);
            border: 1.5px solid var(--border-light);
            border-radius: 1rem;
            padding: 0.75rem 1rem;
            font-size: 0.9rem;
            color: var(--text-primary);
            transition: all var(--transition);
        }

        .form-control:focus, .form-select:focus {
            border-color: var(--border-focus);
            box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
            outline: none;
        }

        .form-control::placeholder {
            color: var(--placeholder);
        }

        .btn-submit {
            background: var(--btn-bg);
            border: none;
            padding: 0.9rem;
            border-radius: 2rem;
            font-weight: 700;
            font-size: 1rem;
            color: white;
            transition: all 0.2s ease;
            width: 100%;
            margin-top: 2rem;
        }

        .btn-submit:hover:not(:disabled) {
            background: var(--btn-hover);
            transform: translateY(-2px);
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.1);
        }

        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .captcha-box {
            background: var(--captcha-bg);
            border-radius: 1.25rem;
            padding: 1.5rem;
            margin-top: 2rem;
            border: 1px solid var(--border-light);
            text-align: center;
        }

        /* BOTÓN MENÚ esquina superior izquierda */
        .menu-corner {
            position: fixed;
            top: 1.2rem;
            left: 1.2rem;
            z-index: 1050;
        }

        .menu-btn {
            background: var(--bg-card);
            border: 1px solid var(--border-light);
            padding: 0.6rem 1.4rem;
            border-radius: 2rem;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-primary);
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            cursor: pointer;
            transition: all 0.2s;
            backdrop-filter: blur(4px);
        }

        .menu-btn:hover {
            background: var(--accent-soft);
            border-color: var(--accent);
            transform: scale(1.02);
        }

        /* SIDEBAR MENÚ */
        .sidebar-menu {
            position: fixed;
            top: 0;
            left: -320px;
            width: 300px;
            height: 100%;
            background: var(--sidebar-bg);
            backdrop-filter: blur(20px);
            box-shadow: 2rem 0 3rem rgba(0, 0, 0, 0.1);
            z-index: 1060;
            transition: left 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            padding: 2rem 1.5rem;
            border-right: 1px solid var(--border-light);
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .sidebar-menu.open {
            left: 0;
        }

        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--overlay);
            backdrop-filter: blur(3px);
            z-index: 1055;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
        }

        .menu-overlay.active {
            visibility: visible;
            opacity: 1;
        }

        .close-sidebar {
            background: none;
            border: none;
            font-size: 1.6rem;
            align-self: flex-end;
            cursor: pointer;
            color: var(--text-muted);
        }

        .menu-title {
            font-weight: 700;
            font-size: 1.5rem;
            color: var(--text-primary);
            border-bottom: 2px solid var(--border-light);
            padding-bottom: 0.5rem;
        }

        .menu-item {
            padding: 0.7rem 0;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            transition: 0.15s;
            border-bottom: 1px solid var(--border-light);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .menu-item:hover {
            color: var(--accent);
            transform: translateX(6px);
        }

        /* Botón externo: SOLO QUASVX (sin Pikapi) */
        .external-link {
            margin-top: 0.5rem;
        }
        .external-btn {
            background: var(--input-bg);
            border: 1px solid var(--border-light);
            padding: 0.7rem;
            border-radius: 1rem;
            font-weight: 600;
            text-align: center;
            cursor: pointer;
            transition: 0.15s;
            color: var(--text-primary);
            text-decoration: none;
            display: block;
        }
        .external-btn:hover {
            background: var(--accent-soft);
            border-color: var(--accent);
            transform: translateX(4px);
        }

        .lang-row {
            display: flex;
            gap: 12px;
            padding-top: 0.5rem;
            border-top: 1px solid var(--border-light);
        }

        .lang-row button {
            flex: 1;
            background: var(--input-bg);
            border: 1px solid var(--border-light);
            padding: 0.6rem;
            border-radius: 2rem;
            font-weight: 600;
            transition: 0.15s;
            color: var(--text-primary);
        }

        .lang-row button:hover {
            background: var(--accent-soft);
        }

        .theme-switch-inline {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--input-bg);
            padding: 0.7rem 1rem;
            border-radius: 3rem;
            border: 1px solid var(--border-light);
        }

        .theme-switch-inline span {
            font-size: 0.85rem;
            font-weight: 500;
        }

        .toggle-switch {
            width: 48px;
            height: 24px;
            background: var(--border-light);
            border-radius: 50px;
            position: relative;
            cursor: pointer;
            transition: 0.2s;
        }

        .toggle-switch::after {
            content: "";
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
            position: absolute;
            top: 2px;
            left: 3px;
            transition: 0.2s;
        }

        body.dark .toggle-switch::after {
            left: 25px;
            background: #0f172a;
        }

        .credits-footer {
            font-size: 0.7rem;
            text-align: center;
            color: var(--text-muted);
            margin-top: 0.5rem;
        }

        /* Modal de éxito con mensaje dinámico sobre el email */
        #successModal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(12px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .modal-card {
            background: var(--bg-card);
            max-width: 450px;
            width: 90%;
            border-radius: 1.75rem;
            padding: 2rem;
            text-align: center;
            animation: fadeSlideUp 0.3s ease;
            border: 1px solid var(--border-light);
        }

        .contact-email {
            background: var(--accent-soft);
            padding: 0.5rem;
            border-radius: 1rem;
            font-family: monospace;
            font-weight: 600;
            margin: 1rem 0;
            color: var(--accent);
        }

        @media (max-width: 640px) {
            body { padding: 1rem; }
            .menu-corner { top: 0.8rem; left: 0.8rem; }
            .menu-btn { padding: 0.5rem 1rem; font-size: 0.8rem; }
        }
    </style>
</head>
<body>

<div class="menu-corner">
    <button class="menu-btn" id="menuBtn">☰ Menú</button>
</div>

<div class="sidebar-menu" id="sidebar">
    <button class="close-sidebar" id="closeSidebarBtn">✕</button>
    <div class="menu-title" id="menuTitle">Menú</div>
    
    <div class="menu-item" id="cleanUrlItem">🏠 Limpiar URL / Inicio</div>
    
    <!-- SOLO QUASVX (sin Pikapi) -->
    <div class="external-link">
        <a href="https://quasvx.pages.dev" target="_blank" rel="noopener noreferrer" class="external-btn" id="quasvxLink">⚡ Quasvx</a>
    </div>
    
    <div class="theme-switch-inline">
        <span id="themeLabel">🌙 Modo oscuro</span>
        <div class="toggle-switch" id="themeToggle"></div>
    </div>
    
    <div class="lang-row">
        <button id="langEsBtn">🇪🇸 ES</button>
        <button id="langEnBtn">🇬🇧 EN</button>
    </div>
    
    <div class="credits-footer" id="footerCredits">Ranky Form • Staff Application</div>
</div>
<div class="menu-overlay" id="menuOverlay"></div>

<div class="container">
    <div class="main-card mx-auto" style="max-width: 1000px;">
        <div class="hero-section">
            <h1 id="title">Ranky Form</h1>
            <p id="subtitle">Staff Application 2026</p>
        </div>
        <div class="p-4 p-md-5">
            <form id="applicationForm">
                <div class="section-label" id="sec1">📋 01. Datos personales</div>
                <div class="row g-4 mb-4">
                    <div class="col-md-6"><label class="form-label" id="lDiscord">Discord *</label><input type="text" id="discord" class="form-control" placeholder="usuario#0000" required></div>
                    <div class="col-md-6"><label class="form-label" id="lEmail">Correo electrónico *</label><input type="email" id="email" class="form-control" placeholder="contacto@ejemplo.com" required></div>
                </div>

                <div class="section-label" id="sec2">🛠️ 02. Perfil profesional</div>
                <div class="row g-4 mb-4">
                    <div class="col-md-6"><label class="form-label" id="lRole">Rol principal *</label><select id="role" class="form-select" required><option value="" disabled selected id="optSelect">Seleccionar</option><option value="Coder" id="optCoder">Desarrollador/a</option><option value="Artist" id="optArtist">Artista gráfico</option><option value="Musician" id="optMusic">Compositor/a</option><option value="Charter" id="optChart">Charter</option></select></div>
                    <div class="col-md-6"><label class="form-label" id="lTools">Herramientas principales *</label><input type="text" id="software" class="form-control" placeholder="Ej: Figma, Unity, FL Studio" required></div>
                    <div class="col-md-4"><label class="form-label" id="lAge">Edad *</label><input type="number" id="age" class="form-control" min="13" required></div>
                    <div class="col-md-4"><label class="form-label" id="lHours">Horas semanales *</label><input type="number" id="hours" class="form-control" required></div>
                    <div class="col-md-4"><label class="form-label" id="lSkill">Nivel de habilidad (0-100) *</label><input type="number" id="skill" class="form-control" min="0" max="100" required></div>
                </div>

                <div class="section-label" id="sec3">✨ 03. Motivación y experiencia</div>
                <div class="row g-4">
                    <div class="col-12"><label class="form-label" id="lPortfolio">Portafolio / GitHub *</label><input type="url" id="portfolio" class="form-control" required></div>
                    <div class="col-12"><label class="form-label" id="lExperience">Experiencia previa *</label><textarea id="experience" class="form-control" rows="2" required></textarea></div>
                    <div class="col-12"><label class="form-label" id="lMotivation">¿Por qué quieres unirte? *</label><textarea id="motivation" class="form-control" rows="3" required></textarea></div>
                    <div class="col-12"><label class="form-label" id="lConflict">Ejemplo de resolución de conflictos *</label><textarea id="conflict" class="form-control" rows="2" required></textarea></div>
                    <div class="col-12"><label class="form-label" id="lFuture">Meta a 1 año *</label><textarea id="future" class="form-control" rows="2" required></textarea></div>
                </div>

                <div class="captcha-box">
                    <label class="form-label mb-3" id="verifyLabel">🔐 Verificación de seguridad</label>
                    <div id="turnstileContainer" class="d-flex justify-content-center"></div>
                    <div id="recaptchaContainer" style="display:none" class="d-flex justify-content-center"></div>
                </div>
                <div id="securityAlert" style="color:#dc2626; font-size:0.85rem; margin-top:1rem; display:none; text-align:center;"></div>
                <button type="submit" class="btn-submit" id="submitBtn" disabled>📤 Enviar solicitud</button>
            </form>
        </div>
    </div>
</div>

<div id="successModal">
    <div class="modal-card">
        <div style="font-size: 3rem;">✅</div>
        <h3 style="font-weight: 700; margin: 1rem 0 0.5rem;" id="modalTitle">Solicitud enviada</h3>
        <div id="modalMessage" style="color: var(--text-secondary); margin: 1rem 0;">
            <!-- Mensaje dinámico se inyecta aquí -->
        </div>
        <button onclick="closeSuccessModal()" class="btn-submit" style="margin-top: 1rem;">Cerrar</button>
    </div>
</div>

<script>
    // ----- COOKIE UTILS -----
    function setCookie(name, value, days = 365) {
        let expires = "";
        if (days) {
            const date = new Date();
            date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000));
            expires = "; expires=" + date.toUTCString();
        }
        document.cookie = name + "=" + (value || "") + expires + "; path=/";
    }
    function getCookie(name) {
        const match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
        return match ? match[2] : null;
    }

    // ----- TEMA (claro/oscuro) -----
    function initTheme() {
        const savedTheme = getCookie('ranky_theme');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        let theme = savedTheme;
        if (!theme) theme = prefersDark ? 'dark' : 'light';
        if (theme === 'dark') document.body.classList.add('dark');
        else document.body.classList.remove('dark');
    }
    function toggleTheme() {
        if (document.body.classList.contains('dark')) {
            document.body.classList.remove('dark');
            setCookie('ranky_theme', 'light', 365);
        } else {
            document.body.classList.add('dark');
            setCookie('ranky_theme', 'dark', 365);
        }
    }
    document.getElementById('themeToggle').addEventListener('click', toggleTheme);

    // ----- TRADUCCIONES -----
    const texts = {
        en: {
            menuTitle: "Menu", cleanUrl: "🏠 Clean URL / Home", themeLabel: "🌙 Dark mode",
            footer: "Ranky Form • Staff Application",
            title: "Ranky Form", subtitle: "Staff Application 2026",
            sec1: "📋 01. Personal info", sec2: "🛠️ 02. Professional profile", sec3: "✨ 03. Motivation & experience",
            lDiscord: "Discord *", lEmail: "Email *", lRole: "Main role *", optSelect: "Select",
            optCoder: "Developer", optArtist: "Graphic Artist", optMusic: "Composer", optChart: "Charter",
            lTools: "Main tools *", lAge: "Age *", lHours: "Weekly hours *", lSkill: "Skill level (0-100) *",
            lPortfolio: "Portfolio / GitHub *", lExperience: "Previous experience *", lMotivation: "Why join us? *",
            lConflict: "Conflict resolution example *", lFuture: "1-year goal *", verifyLabel: "🔐 Security verification",
            submitBtn: "📤 Submit application", modalTitle: "Application sent",
            modalTextValid: "We will contact you within the next few days from:",
            modalTextInvalid: "⚠️ You did not provide a valid email address. We cannot contact you. Please try again with a real email.",
            contactEmail: "quasvx@outlook.es",
            errors: { mouse: "⚠️ Move your mouse or interact with the page.", speed: "⚠️ Form sent too quickly. Please wait.", paste: "⚠️ Avoid excessive copy-paste." }
        },
        es: {
            menuTitle: "Menú", cleanUrl: "🏠 Limpiar URL / Inicio", themeLabel: "🌙 Modo oscuro",
            footer: "Ranky Form • Solicitud de Staff",
            title: "Ranky Form", subtitle: "Solicitud de Staff 2026",
            sec1: "📋 01. Datos personales", sec2: "🛠️ 02. Perfil profesional", sec3: "✨ 03. Motivación y experiencia",
            lDiscord: "Discord *", lEmail: "Correo electrónico *", lRole: "Rol principal *", optSelect: "Seleccionar",
            optCoder: "Desarrollador/a", optArtist: "Artista gráfico", optMusic: "Compositor/a", optChart: "Charter",
            lTools: "Herramientas principales *", lAge: "Edad *", lHours: "Horas semanales *", lSkill: "Nivel (0-100) *",
            lPortfolio: "Portafolio / GitHub *", lExperience: "Experiencia previa *", lMotivation: "¿Por qué unirte? *",
            lConflict: "Ejemplo resolución de conflictos *", lFuture: "Meta a 1 año *", verifyLabel: "🔐 Verificación de seguridad",
            submitBtn: "📤 Enviar solicitud", modalTitle: "Solicitud enviada",
            modalTextValid: "Nos pondremos en contacto contigo en los próximos días desde:",
            modalTextInvalid: "⚠️ No ingresaste un correo electrónico válido. No podemos contactarte. Vuelve a intentarlo con un email real.",
            contactEmail: "quasvx@outlook.es",
            errors: { mouse: "⚠️ Mueve el ratón o interactúa con la página.", speed: "⚠️ Envío demasiado rápido. Espera.", paste: "⚠️ Evita copiar y pegar en exceso." }
        }
    };
    let currentLang = 'es';
    function applyLanguage(lang) {
        currentLang = lang;
        setCookie('ranky_lang', lang, 365);
        const t = texts[lang];
        document.getElementById('menuTitle').innerText = t.menuTitle;
        document.getElementById('cleanUrlItem').innerHTML = t.cleanUrl;
        document.getElementById('themeLabel').innerHTML = t.themeLabel;
        document.getElementById('footerCredits').innerText = t.footer;
        document.getElementById('title').innerText = t.title;
        document.getElementById('subtitle').innerText = t.subtitle;
        document.getElementById('sec1').innerText = t.sec1;
        document.getElementById('sec2').innerText = t.sec2;
        document.getElementById('sec3').innerText = t.sec3;
        document.getElementById('lDiscord').innerText = t.lDiscord;
        document.getElementById('lEmail').innerText = t.lEmail;
        document.getElementById('lRole').innerText = t.lRole;
        document.getElementById('optSelect').innerText = t.optSelect;
        document.getElementById('optCoder').innerText = t.optCoder;
        document.getElementById('optArtist').innerText = t.optArtist;
        document.getElementById('optMusic').innerText = t.optMusic;
        document.getElementById('optChart').innerText = t.optChart;
        document.getElementById('lTools').innerText = t.lTools;
        document.getElementById('lAge').innerText = t.lAge;
        document.getElementById('lHours').innerText = t.lHours;
        document.getElementById('lSkill').innerText = t.lSkill;
        document.getElementById('lPortfolio').innerText = t.lPortfolio;
        document.getElementById('lExperience').innerText = t.lExperience;
        document.getElementById('lMotivation').innerText = t.lMotivation;
        document.getElementById('lConflict').innerText = t.lConflict;
        document.getElementById('lFuture').innerText = t.lFuture;
        document.getElementById('verifyLabel').innerText = t.verifyLabel;
        document.getElementById('submitBtn').innerText = t.submitBtn;
        document.getElementById('modalTitle').innerText = t.modalTitle;
        document.getElementById('menuBtn').innerText = lang === 'es' ? '☰ Menú' : '☰ Menu';
    }

    // --- Menú lateral y limpiar URL ---
    const sidebar = document.getElementById('sidebar');
    const overlayMenu = document.getElementById('menuOverlay');
    function openMenu() { sidebar.classList.add('open'); overlayMenu.classList.add('active'); }
    function closeMenu() { sidebar.classList.remove('open'); overlayMenu.classList.remove('active'); }
    document.getElementById('menuBtn').addEventListener('click', openMenu);
    document.getElementById('closeSidebarBtn').addEventListener('click', closeMenu);
    overlayMenu.addEventListener('click', closeMenu);
    document.getElementById('cleanUrlItem').addEventListener('click', () => {
        const cleanUrl = window.location.origin + window.location.pathname;
        window.history.replaceState({}, document.title, cleanUrl);
        closeMenu();
        const alertDiv = document.getElementById('securityAlert');
        alertDiv.innerText = "✓ URL limpiada";
        alertDiv.style.color = "#10b981";
        alertDiv.style.display = "block";
        setTimeout(() => alertDiv.style.display = "none", 1800);
    });

    // --- Captcha y envío ---
    let captchaToken = null, isFallback = false;
    window.renderTurnstile = (sitekey, rcKey) => {
        turnstile.render('#turnstileContainer', { 
            sitekey, 
            callback: (t) => { captchaToken = t; document.getElementById('submitBtn').disabled = false; }, 
            'error-callback': () => { 
                document.getElementById('turnstileContainer').style.display = 'none'; 
                document.getElementById('recaptchaContainer').style.display = 'flex'; 
                grecaptcha.render('recaptchaContainer', { sitekey: rcKey, callback: (t) => { captchaToken = t; document.getElementById('submitBtn').disabled = false; }, theme: 'light' }); 
                isFallback = true; 
            } 
        });
    };
    fetch('./config.json').then(r=>r.json()).then(cfg=>renderTurnstile(cfg.sitekey, cfg.recaptchaSitekey)).catch(()=>renderTurnstile("1x00000000000000000000AA","6LeIxAcTAAAAAJcZVRqyHh71UMIEGNQ_MXjiZKhI"));

    let mouseMoves = 0, pasteCount = 0, startTime = Date.now();
    document.addEventListener('mousemove', () => mouseMoves++);
    document.querySelectorAll('input,textarea').forEach(el => el.addEventListener('paste', () => pasteCount++));

    function isValidEmail(email) {
        return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }

    function showSuccessModal(userEmail) {
        const t = texts[currentLang];
        const modalMessageDiv = document.getElementById('modalMessage');
        if (userEmail && isValidEmail(userEmail)) {
            modalMessageDiv.innerHTML = `
                <p>${t.modalTextValid}</p>
                <div class="contact-email">${t.contactEmail}</div>
                <p style="font-size:0.8rem; margin-top:0.8rem;">✅ Hemos recibido tu correo: <strong>${userEmail}</strong></p>
            `;
        } else {
            modalMessageDiv.innerHTML = `<p>${t.modalTextInvalid}</p>`;
        }
        document.getElementById('successModal').style.display = 'flex';
    }

    document.getElementById('applicationForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const elapsed = (Date.now()-startTime)/1000;
        const err = texts[currentLang].errors;
        const alertDiv = document.getElementById('securityAlert');
        if(mouseMoves < 6) { alertDiv.innerText = err.mouse; alertDiv.style.display='block'; return; }
        if(elapsed < 7) { alertDiv.innerText = err.speed; alertDiv.style.display='block'; return; }
        if(pasteCount > 3) { alertDiv.innerText = err.paste; alertDiv.style.display='block'; return; }
        
        const userEmail = document.getElementById('email').value;
        
        const btn = document.getElementById('submitBtn'); 
        btn.disabled=true; 
        btn.innerText="...";
        try {
            const formData = {
                discord: document.getElementById('discord').value,
                email: userEmail,
                role: document.getElementById('role').value,
                software: document.getElementById('software').value,
                age: document.getElementById('age').value,
                hours: document.getElementById('hours').value,
                skill: document.getElementById('skill').value,
                portfolio: document.getElementById('portfolio').value,
                experience: document.getElementById('experience').value,
                motivation: document.getElementById('motivation').value,
                conflict: document.getElementById('conflict').value,
                future: document.getElementById('future').value,
                lang: currentLang
            };
            const res = await fetch('https://ranky-api.pages.dev/api/api', { 
                method:'POST', 
                headers:{'Content-Type':'application/json'}, 
                body: JSON.stringify({ type:'form', turnstileToken: captchaToken, isFallback, formData }) 
            });
            const data = await res.json();
            if(data.success) {
                showSuccessModal(userEmail);
            } else {
                alert("Error en el envío. Inténtalo de nuevo.");
            }
        } catch(e) { 
            console.error(e);
            alert("Error de red. Revisa tu conexión."); 
        } finally { 
            btn.disabled=false; 
            btn.innerText=texts[currentLang].submitBtn; 
        }
    });
    
    function closeSuccessModal() { document.getElementById('successModal').style.display = 'none'; }
    window.closeSuccessModal = closeSuccessModal;
    
    initTheme();
    const savedLang = getCookie('ranky_lang');
    applyLanguage(savedLang === 'en' ? 'en' : 'es');
</script>
</body>
</html>

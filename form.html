<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta 
    http-equiv="Content-Security-Policy" 
    content="default-src 'self' https:; 
    script-src 'self' 'unsafe-inline' 'unsafe-eval' https://challenges.cloudflare.com https://www.google.com https://www.gstatic.com; 
    frame-src 'self' https://challenges.cloudflare.com https://www.google.com; 
    style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; 
    font-src 'self' https://fonts.gstatic.com; 
    img-src 'self' data: https:; 
    connect-src 'self' https://challenges.cloudflare.com https://ranky-api.pages.dev https://cdn.jsdelivr.net;"
>
    
    <title>Ranky | Join the Team (Staff Application)</title>
    <link rel="icon" href="formulary.ico" type="image/x-icon">

    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit" async defer></script>
    <script src="https://www.google.com/recaptcha/api.js?render=explicit" async defer></script>

    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@700;800&family=Outfit:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        /* ========================================================================
           CSS MASTER ENGINE - INDUSTRIAL ROUNDED v3.0
           ========================================================================
        */
        :root {
            --accent: #00d2ff;
            --accent-glow: rgba(0, 210, 255, 0.4);
            --bg: #020617;
            --card-glass: rgba(15, 23, 42, 0.98);
            --input-bg: rgba(0, 0, 0, 0.6);
            --font-main: 'Outfit', sans-serif;
            --font-tech: 'Rajdhani', sans-serif;
            --error: #ff4d4d;
            --smooth: cubic-bezier(0.23, 1, 0.32, 1);
        }

        /* CUSTOM SCROLLBAR */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 5px; }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none !important; }
        
        body {
            background-color: var(--bg); margin: 0; padding: 60px 0; min-height: 100vh;
            color: #ffffff; font-family: var(--font-main); overflow-x: hidden; position: relative;
        }

        /* DYNAMIC BG ANIMATION */
        body::before {
            content: ""; position: fixed; top: -50%; left: -50%; width: 200%; height: 200%; 
            background-image: repeating-linear-gradient(-45deg, transparent, transparent 20px, rgba(0, 210, 255, 0.035) 20px, rgba(0, 210, 255, 0.035) 21px);
            animation: moveStripes 50s linear infinite; z-index: -1; pointer-events: none;
        }
        @keyframes moveStripes { from { transform: translate(0, 0); } to { transform: translate(50px, -50px); } }

        /* BUBBLE PARTICLE SYSTEM */
        .bubbles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; overflow: hidden; z-index: 0; pointer-events: none; }
        .bubble { position: absolute; bottom: -150px; border-radius: 50%; background: linear-gradient(135deg, rgba(0, 210, 255, 0.1), rgba(0, 210, 255, 0.02)); animation: floatUp linear infinite; filter: blur(1px); }
        @keyframes floatUp { 0% { transform: translateY(0) scale(1); opacity: 0; } 20% { opacity: 0.6; } 100% { transform: translateY(-140vh) scale(1.3); opacity: 0; } }

        /* MAIN UI CARD */
        .main-card {
            background: var(--card-glass); border: 2.5px solid rgba(0, 210, 255, 0.3);
            border-radius: 30px; overflow: hidden; backdrop-filter: blur(40px);
            box-shadow: 0 45px 120px rgba(0,0,0,0.95); position: relative; z-index: 10;
            animation: cardEntrance 1.4s var(--smooth) forwards;
        }
        @keyframes cardEntrance { from { opacity: 0; transform: translateY(100px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }

        .hero-section {
            background: linear-gradient(135deg, rgba(0, 210, 255, 0.2), transparent);
            padding: 80px 40px; border-bottom: 1px solid rgba(0, 210, 255, 0.2); text-align: center;
        }
        .hero-section h1 { font-family: var(--font-tech); font-size: clamp(3rem, 9vw, 4.5rem); font-weight: 800; color: var(--accent); margin: 0; text-transform: uppercase; text-shadow: 0 0 50px var(--accent-glow); letter-spacing: 2px; }
        .hero-section p { font-weight: 700; color: #94a3b8; letter-spacing: 6px; text-transform: uppercase; font-size: 1rem; margin-top: 15px; }

        /* FORM FIELD SYSTEM */
        .section-label { 
            color: #475569; font-family: var(--font-tech); font-weight: 800; text-transform: uppercase; 
            letter-spacing: 4px; font-size: 1.2rem; border-bottom: 1px solid rgba(71, 85, 105, 0.3); 
            padding-bottom: 12px; margin: 50px 0 35px;
        }
        .form-label { font-family: var(--font-tech); color: var(--accent); font-weight: 800; text-transform: uppercase; letter-spacing: 1.8px; font-size: 0.95rem; margin-bottom: 12px; display: block; }
        .form-control, .form-select { 
            background: var(--input-bg) !important; border: 2px solid #1e293b; color: #ffffff !important; 
            border-radius: 18px; padding: 18px 25px; transition: all 0.4s var(--smooth); font-family: var(--font-main);
        }
        .form-control:focus { border-color: var(--accent); box-shadow: 0 0 40px rgba(0, 210, 255, 0.15); transform: scale(1.02); }

        /* --- THE BUTTON (SMOOTH FIX) --- */
        .btn-submit { 
            background: var(--accent); color: #020617; font-family: var(--font-tech); font-weight: 900; 
            font-size: 2rem; padding: 25px; border-radius: 22px; border: none; width: 100%; 
            text-transform: uppercase; cursor: pointer; margin-top: 40px; letter-spacing: 4px;
            transition: all 0.6s var(--smooth);
            box-shadow: 0 10px 30px rgba(0, 210, 255, 0.2);
        }
        .btn-submit:hover:not(:disabled) { transform: translateY(-12px) scale(1.03); box-shadow: 0 25px 60px var(--accent-glow); background: #ffffff; color: #000; }
        .btn-submit:disabled { background: #1e293b; color: #475569; cursor: not-allowed; opacity: 0.7; }

        /* SECURITY & OVERLAYS */
        .captcha-box { background: rgba(0,0,0,0.5); padding: 40px; border-radius: 30px; border: 2px solid #1e293b; margin-top: 50px; text-align: center; }
        
        /* EL MENÚ DE QUASVX (SCROLLABLE) */
        #finalMenu { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.98); display: none; 
            justify-content: center; align-items: flex-start; 
            z-index: 5000; backdrop-filter: blur(50px); 
            overflow-y: auto; padding: 60px 0;
        }
        .menu-card-premium { background: #000; padding: 60px 45px; border-radius: 40px; border: 5px solid var(--accent); text-align: center; max-width: 700px; width: 95%; margin: auto; box-shadow: 0 0 180px rgba(0, 210, 255, 0.4); }

        .credits-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 40px 0; text-align: left; }
        .credit-box { background: rgba(15, 23, 42, 0.9); padding: 20px; border-radius: 20px; border-left: 5px solid var(--accent); }
        .credit-box label { color: var(--accent); font-family: var(--font-tech); font-weight: 800; font-size: 0.9rem; text-transform: uppercase; display: block; }
        .credit-box span { color: #fff; font-weight: 700; font-size: 1.2rem; }

        .btn-home-terminal { background: var(--accent); color: #000; font-family: var(--font-tech); font-weight: 900; padding: 20px; border-radius: 15px; border: none; width: 100%; font-size: 1.4rem; cursor: pointer; transition: 0.5s var(--smooth); margin-top: 20px; text-transform: uppercase; }
        .btn-home-terminal:hover { transform: translateY(-8px); background: #fff; }

        .lang-switcher { position: fixed; bottom: 45px; right: 45px; display: flex; gap: 15px; z-index: 10000; }
        .lang-btn { background: #0f172a; border: 3px solid var(--accent); color: #fff; padding: 15px 30px; border-radius: 15px; font-weight: 900; cursor: pointer; font-family: var(--font-tech); transition: 0.5s var(--smooth); }
        .lang-btn:hover { background: var(--accent); color: #000; transform: translateY(-10px); }

        @media (max-width: 768px) { .main-card { border-radius: 0; } .credits-grid { grid-template-columns: 1fr; } .lang-switcher { right: 50%; transform: translateX(50%); bottom: 20px; } }
    </style>
</head>
<body>

    <div class="bubbles" id="bubblesContainer"></div>

    <div class="container">
        <div class="main-card mx-auto" style="max-width: 1150px;">
            <div class="hero-section">
                <h1 id="t-title">RANKY TEAM</h1>
                <p id="t-subtitle">OFFICIAL STAFF APPLICATION 2026</p>
            </div>
            
            <div class="p-4 p-md-5">
                <form id="recruitForm" autocomplete="off">
                    
                    <div class="section-label" id="t-sec-1">01. Identity Hub</div>
                    <div class="row g-4 mb-4">
                        <div class="col-md-6">
                            <label class="form-label" id="t-l-discord">Discord Username *</label>
                            <input type="text" id="discord" class="form-control" placeholder="user#0000" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label" id="t-l-email">Professional Email *</label>
                            <input type="email" id="email" class="form-control" placeholder="contact@example.com" required>
                        </div>
                    </div>

                    <div class="section-label" id="t-sec-2">02. Technical Specifications</div>
                    <div class="row g-4 mb-4">
                        <div class="col-md-6">
                            <label class="form-label" id="t-l-role">Primary Role *</label>
                            <select id="role" class="form-select" required>
                                <option value="" disabled selected id="t-opt-select">Select area</option>
                                <option value="Coder" id="t-opt-coder">Software Engineer</option>
                                <option value="Artist" id="t-opt-artist">Graphic Artist</option>
                                <option value="Musician" id="t-opt-music">Music Composer</option>
                                <option value="Charter" id="t-opt-chart">Charter</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label" id="t-l-software">Main Tools *</label>
                            <input type="text" id="software" class="form-control" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label" id="t-l-age">Applicant Age *</label>
                            <input type="number" id="age" class="form-control" min="13" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label" id="t-l-hours">Weekly Hours *</label>
                            <input type="number" id="hours" class="form-control" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label" id="t-l-skill">Skill Mastery (0-100) *</label>
                            <input type="number" id="skill" class="form-control" min="0" max="100" required>
                        </div>
                    </div>

                    <div class="section-label" id="t-sec-3">03. Project Alignment</div>
                    <div class="row g-4">
                        <div class="col-12">
                            <label class="form-label" id="t-l-portfolio">Portfolio / Proof of Work URL *</label>
                            <input type="url" id="portfolio" class="form-control" required>
                        </div>
                        <div class="col-12">
                            <label class="form-label" id="t-l-experience">Previous Experience *</label>
                            <textarea id="experience" class="form-control" rows="3" required></textarea>
                        </div>
                        <div class="col-12">
                            <label class="form-label" id="t-l-motivation">Motivation Statement *</label>
                            <textarea id="motivation" class="form-control" rows="4" required></textarea>
                        </div>
                        <div class="col-12">
                            <label class="form-label" id="t-l-conflict">Creative Conflict Resolution *</label>
                            <textarea id="conflict" class="form-control" rows="3" required></textarea>
                        </div>
                        <div class="col-12">
                            <label class="form-label" id="t-l-future">Future Goals (1 Year) *</label>
                            <textarea id="future" class="form-control" rows="3" required></textarea>
                        </div>
                    </div>

                    <div class="captcha-box">
                        <label class="form-label mb-4" id="t-l-verify">Integrity Verification</label>
                        <div id="turnstile-container" class="d-flex justify-content-center"></div>
                        <div id="recaptcha-container" style="display:none" class="d-flex justify-content-center"></div>
                    </div>

                    <div id="security-alert" style="color:var(--error); font-weight:800; margin-top:30px; display:none; text-align:center;"></div>
                    <button type="submit" class="btn-submit" id="t-btn" disabled>TRANSMIT APPLICATION</button>
                </form>
            </div>
        </div>
    </div>

    <div id="finalMenu">
        <div class="menu-card-premium">
            <h3 style="font-family: var(--font-tech); font-size: 3.5rem; color: var(--accent); font-weight: 900; margin-bottom: 5px;">QUASVX CREDITS</h3>
            <p style="color: #94a3b8; font-weight: 800; text-transform: uppercase; letter-spacing: 3px;" id="t-cred-sub">AUTHORIZED RECRUITMENT HUB</p>
            
            <div class="credits-grid">
                <div class="credit-box"><label id="t-c-auth">AUTHOR</label><span>Pikapi</span></div>
                <div class="credit-box"><label id="t-c-co">CO-AUTHOR</label><span>Quasvx</span></div>
                <div class="credit-box"><label id="t-c-lead">LEAD ARCHITECT</label><span>Quasvx</span></div>
                <div class="credit-box"><label id="t-c-sec">SECURITY ENGINE</label><span>v3.3 Shield</span></div>
            </div>

            <span id="t-thanks" style="font-weight: 800; color: #fff; font-size: 1.6rem; display: block; margin-bottom: 40px; text-transform: uppercase;">APPLICATION RECEIVED!</span>
            
            <div style="display: flex; flex-direction: column; gap: 15px;">
                <a href="https://x.com/Quasvx" target="_blank" class="btn btn-primary py-3 fw-bold">Twitter Quasvx</a>
                <button class="btn-home-terminal" onclick="document.getElementById('finalMenu').style.display='none'">CLOSE TERMINAL</button>
            </div>
        </div>
    </div>

    <div class="lang-switcher">
        <button class="lang-btn" onclick="setLanguage('es')">ES</button>
        <button class="lang-btn" onclick="setLanguage('en')">EN</button>
    </div>

    <script>
        let mouseTelemetry = 0;
        let pasteCount = 0;
        let bootTime = Date.now();
        let captchaToken = null;
        let isFallback = false;

        const translations = {
            en: {
                title: "RANKY TEAM", subtitle: "OFFICIAL STAFF APPLICATION 2026",
                sec_1: "01. Identity Hub", sec_2: "02. Technical Specifications", sec_3: "03. Project Alignment",
                l_discord: "Discord Username *", l_email: "Email *", l_role: "Role *", opt_select: "Select area",
                opt_coder: "Software Engineer", opt_artist: "Graphic Artist", opt_music: "Music Composer", opt_chart: "Charter",
                l_software: "Main Tools *", l_age: "Age *", l_hours: "Hours *", l_skill: "Mastery *",
                l_portfolio: "Portfolio URL *", l_experience: "Experience *", l_motivation: "Motivation *",
                l_conflict: "Conflicts? *", l_future: "Future? *", l_verify: "Integrity Verification",
                btn: "TRANSMIT APPLICATION", thanks: "APPLICATION RECEIVED!",
                cred_sub: "AUTHORIZED RECRUITMENT HUB", c_auth: "AUTHOR", c_co: "CO-AUTHOR", c_lead: "LEAD ARCHITECT", c_sec: "SECURITY ENGINE",
                err_mouse: "Error: No human activity detected.", err_speed: "Error: Submission too fast.", err_paste: "Error: Paste detected."
            },
            es: {
                title: "EQUIPO RANKY", subtitle: "SOLICITUD DE STAFF OFICIAL 2026",
                sec_1: "01. Identidad", sec_2: "02. Datos Técnicos", sec_3: "03. Alineación",
                l_discord: "Discord *", l_email: "Correo *", l_role: "Rol *", opt_select: "Selecciona área",
                opt_coder: "Ingeniero", opt_artist: "Artista", opt_music: "Compositor", opt_chart: "Charter",
                l_software: "Herramientas *", l_age: "Edad *", l_hours: "Horas *", l_skill: "Maestría *",
                l_portfolio: "Portfolio *", l_experience: "Experiencia *", l_motivation: "Motivación *",
                l_conflict: "¿Conflictos? *", l_future: "¿Futuro? *", l_verify: "Verificación de Integridad",
                btn: "TRANSMITIR SOLICITUD", thanks: "¡SOLICITUD RECIBIDA!",
                cred_sub: "CENTRO AUTORIZADO", c_auth: "AUTOR", c_co: "CO-AUTOR", c_lead: "ARQUITECTO", c_sec: "SEGURIDAD",
                err_mouse: "Error: Sin actividad humana.", err_speed: "Error: Envío muy rápido.", err_paste: "Error: Texto pegado."
            }
        };

        function setLanguage(lang) {
            window.currentLang = lang; const t = translations[lang];
            document.getElementById('t-title').innerText = t.title;
            document.getElementById('t-subtitle').innerText = t.subtitle;
            document.getElementById('t-sec-1').innerText = t.sec_1;
            document.getElementById('t-sec-2').innerText = t.sec_2;
            document.getElementById('t-sec-3').innerText = t.sec_3;
            document.getElementById('t-l-discord').innerText = t.l_discord;
            document.getElementById('t-l-email').innerText = t.l_email;
            document.getElementById('t-l-role').innerText = t.l_role;
            document.getElementById('t-opt-select').innerText = t.opt_select;
            document.getElementById('t-opt-coder').innerText = t.opt_coder;
            document.getElementById('t-opt-artist').innerText = t.opt_artist;
            document.getElementById('t-opt-music').innerText = t.opt_music;
            document.getElementById('t-opt-chart').innerText = t.opt_chart;
            document.getElementById('t-l-software').innerText = t.l_software;
            document.getElementById('t-l-age').innerText = t.l_age;
            document.getElementById('t-l-hours').innerText = t.l_hours;
            document.getElementById('t-l-skill').innerText = t.l_skill;
            document.getElementById('t-l-portfolio').innerText = t.l_portfolio;
            document.getElementById('t-l-experience').innerText = t.l_experience;
            document.getElementById('t-l-motivation').innerText = t.l_motivation;
            document.getElementById('t-l-conflict').innerText = t.l_conflict;
            document.getElementById('t-l-future').innerText = t.l_future;
            document.getElementById('t-l-verify').innerText = t.l_verify;
            document.getElementById('t-btn').innerText = t.btn;
            document.getElementById('t-thanks').innerText = t.thanks;
            document.getElementById('t-cred-sub').innerText = t.cred_sub;
            document.getElementById('t-c-auth').innerText = t.c_auth;
            document.getElementById('t-c-co').innerText = t.c_co;
            document.getElementById('t-c-lead').innerText = t.c_lead;
            document.getElementById('t-c-sec').innerText = t.c_sec;
            localStorage.setItem('rankyLang', lang);
        }

        window.addEventListener('mousemove', () => { mouseTelemetry++; });
        document.querySelectorAll('textarea').forEach(el => { el.addEventListener('paste', () => { pasteCount++; }); });

        function renderCaptchas(sitekey, rcKey) {
            turnstile.render('#turnstile-container', {
                sitekey: sitekey,
                callback: function(token) { captchaToken = token; document.getElementById('t-btn').disabled = false; },
                'error-callback': function() { activateFallback(rcKey); }
            });
        }

        function activateFallback(rcKey) {
            isFallback = true;
            document.getElementById('turnstile-container').style.display = 'none';
            document.getElementById('recaptcha-container').style.display = 'flex';
            grecaptcha.render('recaptcha-container', { sitekey: rcKey, callback: function(token) { captchaToken = token; document.getElementById('t-btn').disabled = false; }, theme: 'dark' });
        }

        document.getElementById('recruitForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const elapsed = (Date.now() - bootTime) / 1000;
            const t = translations[window.currentLang];
            const warn = document.getElementById('security-alert');

            if (mouseTelemetry < 15) { warn.innerText = t.err_mouse; warn.style.display = 'block'; return; }
            if (elapsed < 12) { warn.innerText = t.err_speed; warn.style.display = 'block'; return; }
            if (pasteCount > 4) { warn.innerText = t.err_paste; warn.style.display = 'block'; return; }

            const formData = {
                discord: document.getElementById('discord').value, email: document.getElementById('email').value,
                role: document.getElementById('role').value, software: document.getElementById('software').value,
                age: document.getElementById('age').value, hours: document.getElementById('hours').value,
                skill: document.getElementById('skill').value, portfolio: document.getElementById('portfolio').value,
                experience: document.getElementById('experience').value, motivation: document.getElementById('motivation').value,
                conflict: document.getElementById('conflict').value, future: document.getElementById('future').value,
                formLanguage: window.currentLang, botRiskScore: 0
            };

            const btn = document.getElementById('t-btn'); btn.disabled = true; btn.innerText = "...";

            try {
                const res = await fetch('https://ranky-api.pages.dev/api/api', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ type: 'form', turnstileToken: captchaToken, isFallback: isFallback, formData: formData })
                });
                const data = await res.json();
                if (data.success) { document.getElementById('finalMenu').style.display = 'flex'; window.scrollTo(0,0); }
                else if (data.blocked) { alert("PROTOCOL ERROR: IP BANNED"); }
            } catch (err) { console.error("API ERROR:", err); }
            finally { btn.disabled = false; btn.innerText = t.btn; }
        });

        window.onload = () => {
            const browserLangs = navigator.languages || [navigator.language];
            const isEs = browserLangs.some(l => l.toLowerCase().startsWith('es'));
            setLanguage(localStorage.getItem('rankyLang') || (isEs ? 'es' : 'en'));

            fetch('./config.json').then(r => r.json()).then(d => { renderCaptchas(d.sitekey, d.recaptchaSitekey); });

            const container = document.getElementById('bubblesContainer');
            for(let i=0; i<120; i++) {
                const b = document.createElement('div'); b.className = 'bubble';
                const s = Math.random() * 70 + 20; b.style.width = s + 'px'; b.style.height = s + 'px';
                b.style.left = Math.random() * 100 + '%'; b.style.animationDuration = (Math.random() * 15 + 15) + 's';
                container.appendChild(b);
            }
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' https:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://challenges.cloudflare.com https://www.google.com https://www.gstatic.com; frame-src 'self' https://challenges.cloudflare.com https://www.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://challenges.cloudflare.com https://ranky-api.pages.dev https://cdn.jsdelivr.net;">
    <title>Ranky | Staff Nexus</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit" async defer></script>
    <script src="https://www.google.com/recaptcha/api.js?render=explicit" async defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #f0f4fa 0%, #e2e8f0 100%);
            font-family: 'Inter', 'Segoe UI', sans-serif;
            min-height: 100vh;
            padding: 2rem 1rem;
            position: relative;
        }

        /* soft glassmorphic texture */
        .bg-noise {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='1' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
        }

        /* main card — elegant neutral palette */
        .main-card {
            background: rgba(255, 255, 255, 0.94);
            backdrop-filter: blur(2px);
            border-radius: 2rem;
            box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.2), 0 1px 2px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.5);
            transition: all 0.2s ease;
            overflow: hidden;
        }

        .hero-section {
            background: linear-gradient(120deg, #1e293b 0%, #0f172a 100%);
            padding: 2.5rem 2rem;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .hero-section h1 {
            font-family: 'Space Grotesk', monospace;
            font-weight: 700;
            font-size: clamp(2.2rem, 6vw, 3.4rem);
            background: linear-gradient(135deg, #f0f9ff, #94a3b8);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.02em;
        }

        .hero-section p {
            color: #cbd5e1;
            font-weight: 500;
            letter-spacing: 1px;
            font-size: 0.85rem;
            text-transform: uppercase;
            margin-top: 0.5rem;
        }

        .section-label {
            font-family: 'Space Grotesk', monospace;
            font-weight: 600;
            font-size: 1.1rem;
            color: #334155;
            border-left: 4px solid #3b82f6;
            padding-left: 1rem;
            margin: 2rem 0 1.5rem 0;
            letter-spacing: -0.2px;
        }

        .form-label {
            font-weight: 600;
            font-size: 0.85rem;
            color: #1e293b;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .form-control, .form-select {
            background: #ffffff;
            border: 1.5px solid #e2e8f0;
            border-radius: 1rem;
            padding: 0.8rem 1rem;
            font-size: 0.95rem;
            transition: 0.2s;
            color: #0f172a;
        }

        .form-control:focus, .form-select:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
            outline: none;
        }

        .btn-submit {
            background: #1e293b;
            border: none;
            padding: 1rem;
            border-radius: 2rem;
            font-weight: 800;
            font-size: 1.1rem;
            letter-spacing: 0.5px;
            color: white;
            transition: all 0.25s ease;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            width: 100%;
            margin-top: 2rem;
        }

        .btn-submit:hover:not(:disabled) {
            background: #0f172a;
            transform: translateY(-2px);
            box-shadow: 0 12px 20px -12px #0f172a;
        }

        .btn-submit:disabled {
            background: #cbd5e1;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .captcha-box {
            background: #f8fafc;
            border-radius: 1.5rem;
            padding: 1.8rem;
            margin-top: 2rem;
            border: 1px solid #e2e8f0;
            text-align: center;
        }

        /* SIDEBAR MENU (left elegant menu) */
        .menu-sidebar {
            position: fixed;
            top: 1.5rem;
            left: 1.5rem;
            z-index: 1050;
        }

        .menu-btn {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 0.7rem 1.6rem;
            border-radius: 3rem;
            font-weight: 700;
            font-family: 'Space Grotesk', monospace;
            color: white;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            transition: all 0.2s;
            cursor: pointer;
        }

        .menu-btn:hover {
            background: #0f172a;
            transform: scale(1.02);
            border-color: #3b82f6;
        }

        .offcanvas-menu {
            position: fixed;
            top: 0;
            left: -320px;
            width: 300px;
            height: 100%;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(16px);
            box-shadow: 2rem 0 3rem rgba(0, 0, 0, 0.1);
            z-index: 1060;
            transition: left 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            padding: 2rem 1.5rem;
            border-right: 1px solid rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .offcanvas-menu.open {
            left: 0;
        }

        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(3px);
            z-index: 1055;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
        }

        .menu-overlay.active {
            visibility: visible;
            opacity: 1;
        }

        .menu-header {
            font-family: 'Space Grotesk', monospace;
            font-weight: 800;
            font-size: 1.8rem;
            background: linear-gradient(135deg, #1e293b, #475569);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 0.5rem;
        }

        .menu-nav-item {
            padding: 0.8rem 0;
            font-weight: 600;
            color: #334155;
            cursor: pointer;
            transition: 0.15s;
            border-bottom: 1px solid #f1f5f9;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .menu-nav-item:hover {
            color: #2563eb;
            transform: translateX(6px);
        }

        .close-menu {
            background: none;
            border: none;
            font-size: 1.8rem;
            align-self: flex-end;
            cursor: pointer;
            color: #64748b;
        }

        .lang-inline {
            margin-top: auto;
            display: flex;
            gap: 12px;
            padding-top: 2rem;
            border-top: 1px solid #e2e8f0;
        }

        .lang-inline button {
            flex: 1;
            background: #f1f5f9;
            border: none;
            padding: 0.6rem;
            border-radius: 2rem;
            font-weight: 700;
            transition: 0.15s;
        }

        .lang-inline button:hover {
            background: #e2e8f0;
        }

        .credits-mini {
            font-size: 0.7rem;
            color: #94a3b8;
            text-align: center;
            margin-top: 1rem;
        }

        /* final modal */
        #finalMenu {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(12px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .success-card {
            background: white;
            max-width: 500px;
            width: 90%;
            border-radius: 2rem;
            padding: 2rem;
            text-align: center;
            animation: scaleIn 0.3s ease;
            box-shadow: 0 25px 40px rgba(0,0,0,0.3);
        }

        @keyframes scaleIn {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        @media (max-width: 640px) {
            .menu-sidebar { top: 1rem; left: 1rem; }
            .menu-btn { padding: 0.5rem 1.2rem; font-size: 0.85rem; }
            body { padding: 1rem; }
        }
    </style>
</head>
<body>
<div class="bg-noise"></div>

<!-- FLOATING MENU BUTTON (LEFT TOP) -->
<div class="menu-sidebar">
    <button class="menu-btn" id="menuToggleBtn" data-i18n="menuBtn">☰ MENU</button>
</div>

<!-- SIDEBAR MENU PANEL -->
<div class="offcanvas-menu" id="offcanvasMenu">
    <button class="close-menu" id="closeMenuBtn">✕</button>
    <div class="menu-header" data-i18n="menuTitle">STAFF HUB</div>
    <div class="menu-nav-item" id="menuHomeAction" data-i18n="menuHome">🏠 Home / Clean URL</div>
    <div class="menu-nav-item" id="menuCreditsAction" data-i18n="menuCredits">⚡ Credits & System</div>
    <div class="lang-inline">
        <button id="langEsSide">🇪🇸 Español</button>
        <button id="langEnSide">🇬🇧 English</button>
    </div>
    <div class="credits-mini" data-i18n="footerCredits">© Ranky Nexus • Quasvx & Pikapi</div>
</div>
<div class="menu-overlay" id="menuOverlay"></div>

<div class="container">
    <div class="main-card mx-auto" style="max-width: 1100px;">
        <div class="hero-section">
            <h1 id="t-title">RANKY NEXUS</h1>
            <p id="t-subtitle">STAFF RECRUITMENT • 2026 CORE</p>
        </div>
        <div class="p-4 p-md-5">
            <form id="recruitForm" autocomplete="off">
                <div class="section-label" id="t-sec-1">📌 01. Identity</div>
                <div class="row g-4 mb-4">
                    <div class="col-md-6"><label class="form-label" id="t-l-discord">Discord username *</label><input type="text" id="discord" class="form-control" placeholder="username#0000" required></div>
                    <div class="col-md-6"><label class="form-label" id="t-l-email">Professional Email *</label><input type="email" id="email" class="form-control" placeholder="hello@domain.com" required></div>
                </div>

                <div class="section-label" id="t-sec-2">🛠️ 02. Tech Profile</div>
                <div class="row g-4 mb-4">
                    <div class="col-md-6"><label class="form-label" id="t-l-role">Primary Role *</label><select id="role" class="form-select" required><option value="" disabled selected id="t-opt-select">Select area</option><option value="Coder" id="t-opt-coder">Software Engineer</option><option value="Artist" id="t-opt-artist">Graphic Artist</option><option value="Musician" id="t-opt-music">Music Composer</option><option value="Charter" id="t-opt-chart">Charter</option></select></div>
                    <div class="col-md-6"><label class="form-label" id="t-l-software">Main Tools *</label><input type="text" id="software" class="form-control" placeholder="Figma, Unity, FL Studio..." required></div>
                    <div class="col-md-4"><label class="form-label" id="t-l-age">Age *</label><input type="number" id="age" class="form-control" min="13" required></div>
                    <div class="col-md-4"><label class="form-label" id="t-l-hours">Weekly availability *</label><input type="number" id="hours" class="form-control" required></div>
                    <div class="col-md-4"><label class="form-label" id="t-l-skill">Skill level (0-100) *</label><input type="number" id="skill" class="form-control" min="0" max="100" required></div>
                </div>

                <div class="section-label" id="t-sec-3">✨ 03. Vision & Alignment</div>
                <div class="row g-4">
                    <div class="col-12"><label class="form-label" id="t-l-portfolio">Portfolio / GitHub / Drive *</label><input type="url" id="portfolio" class="form-control" required></div>
                    <div class="col-12"><label class="form-label" id="t-l-experience">Previous Experience *</label><textarea id="experience" class="form-control" rows="2" required></textarea></div>
                    <div class="col-12"><label class="form-label" id="t-l-motivation">Why Ranky? *</label><textarea id="motivation" class="form-control" rows="3" required></textarea></div>
                    <div class="col-12"><label class="form-label" id="t-l-conflict">Conflict resolution example *</label><textarea id="conflict" class="form-control" rows="2" required></textarea></div>
                    <div class="col-12"><label class="form-label" id="t-l-future">1-year goal *</label><textarea id="future" class="form-control" rows="2" required></textarea></div>
                </div>

                <div class="captcha-box">
                    <label class="form-label mb-3" id="t-l-verify">🔐 Verification</label>
                    <div id="turnstile-container" class="d-flex justify-content-center"></div>
                    <div id="recaptcha-container" style="display:none" class="d-flex justify-content-center"></div>
                </div>
                <div id="security-alert" style="color:#dc2626; font-weight:500; margin-top:1rem; display:none; text-align:center;"></div>
                <button type="submit" class="btn-submit" id="t-btn" disabled>⚡ SUBMIT APPLICATION</button>
            </form>
        </div>
    </div>
</div>

<div id="finalMenu">
    <div class="success-card">
        <div style="font-size: 3rem;">✨</div>
        <h3 style="font-weight: 800; color:#0f172a;" id="t-thanks">APPLICATION RECEIVED</h3>
        <p style="color:#475569;" id="t-cred-sub">Your signal has been transmitted</p>
        <div style="background:#f1f5f9; border-radius: 1rem; padding: 1rem; margin: 1rem 0;">
            <div style="font-weight:700;">👾 Quasvx • Pikapi</div>
            <div style="font-size:0.8rem;">Security v4 / Shield active</div>
        </div>
        <button onclick="document.getElementById('finalMenu').style.display='none'" class="btn btn-dark w-100 py-2 rounded-pill">CLOSE</button>
    </div>
</div>

<script>
    // ----- Translations (enhanced + MENU strings) -----
    const translations = {
        en: {
            menuBtn: "☰ MENU", menuTitle: "STAFF HUB", menuHome: "🏠 Home / Clean URL", menuCredits: "⚡ Credits & Info", footerCredits: "© Ranky Nexus • Quasvx & Pikapi",
            title: "RANKY NEXUS", subtitle: "STAFF RECRUITMENT • 2026 CORE",
            sec_1: "📌 01. Identity", sec_2: "🛠️ 02. Tech Profile", sec_3: "✨ 03. Vision & Alignment",
            l_discord: "Discord username *", l_email: "Professional Email *", l_role: "Primary Role *", opt_select: "Select area",
            opt_coder: "Software Engineer", opt_artist: "Graphic Artist", opt_music: "Music Composer", opt_chart: "Charter",
            l_software: "Main Tools *", l_age: "Age *", l_hours: "Weekly availability *", l_skill: "Skill level (0-100) *",
            l_portfolio: "Portfolio / GitHub / Drive *", l_experience: "Previous Experience *", l_motivation: "Why Ranky? *",
            l_conflict: "Conflict resolution example *", l_future: "1-year goal *", l_verify: "🔐 Verification",
            btn: "⚡ SUBMIT APPLICATION", thanks: "APPLICATION RECEIVED", cred_sub: "Your signal has been transmitted",
            err_mouse: "⚠️ Security: move your mouse or interact with the page.", err_speed: "⚠️ Form sent too quickly. Please review and wait.", err_paste: "⚠️ Excessive pasting detected. Type naturally."
        },
        es: {
            menuBtn: "☰ MENÚ", menuTitle: "CENTRO STAFF", menuHome: "🏠 Inicio / Limpiar URL", menuCredits: "⚡ Créditos & Sistema", footerCredits: "© Ranky Nexus • Quasvx & Pikapi",
            title: "RANKY NEXUS", subtitle: "RECLUTAMIENTO • 2026 CORE",
            sec_1: "📌 01. Identidad", sec_2: "🛠️ 02. Perfil Técnico", sec_3: "✨ 03. Visión",
            l_discord: "Usuario Discord *", l_email: "Correo profesional *", l_role: "Rol principal *", opt_select: "Selecciona área",
            opt_coder: "Ingeniero/a", opt_artist: "Artista Gráfico", opt_music: "Compositor/a", opt_chart: "Charter",
            l_software: "Herramientas principales *", l_age: "Edad *", l_hours: "Disponibilidad semanal *", l_skill: "Nivel (0-100) *",
            l_portfolio: "Portafolio / GitHub *", l_experience: "Experiencia previa *", l_motivation: "¿Por qué Ranky? *",
            l_conflict: "Ejemplo resolución conflictos *", l_future: "Meta a 1 año *", l_verify: "🔐 Verificación",
            btn: "⚡ ENVIAR SOLICITUD", thanks: "SOLICITUD RECIBIDA", cred_sub: "Tu señal ha sido transmitida",
            err_mouse: "⚠️ Seguridad: mueve el ratón o interactúa.", err_speed: "⚠️ Envío demasiado rápido. Espera un momento.", err_paste: "⚠️ Exceso de pegado. Escribe manualmente."
        }
    };

    let currentLang = 'en';
    let mouseTelemetry = 0;
    let pasteCount = 0;
    let bootTime = Date.now();
    let captchaToken = null;
    let isFallback = false;
    let turnstileWidget = null;

    // Apply language to all i18n elements
    function applyLanguage(lang) {
        currentLang = lang;
        const t = translations[lang];
        document.getElementById('t-title').innerText = t.title;
        document.getElementById('t-subtitle').innerText = t.subtitle;
        document.getElementById('t-sec-1').innerText = t.sec_1;
        document.getElementById('t-sec-2').innerText = t.sec_2;
        document.getElementById('t-sec-3').innerText = t.sec_3;
        document.getElementById('t-l-discord').innerText = t.l_discord;
        document.getElementById('t-l-email').innerText = t.l_email;
        document.getElementById('t-l-role').innerText = t.l_role;
        document.getElementById('t-opt-select').innerText = t.opt_select;
        document.getElementById('t-opt-coder').innerText = t.opt_coder;
        document.getElementById('t-opt-artist').innerText = t.opt_artist;
        document.getElementById('t-opt-music').innerText = t.opt_music;
        document.getElementById('t-opt-chart').innerText = t.opt_chart;
        document.getElementById('t-l-software').innerText = t.l_software;
        document.getElementById('t-l-age').innerText = t.l_age;
        document.getElementById('t-l-hours').innerText = t.l_hours;
        document.getElementById('t-l-skill').innerText = t.l_skill;
        document.getElementById('t-l-portfolio').innerText = t.l_portfolio;
        document.getElementById('t-l-experience').innerText = t.l_experience;
        document.getElementById('t-l-motivation').innerText = t.l_motivation;
        document.getElementById('t-l-conflict').innerText = t.l_conflict;
        document.getElementById('t-l-future').innerText = t.l_future;
        document.getElementById('t-l-verify').innerText = t.l_verify;
        document.getElementById('t-btn').innerText = t.btn;
        document.getElementById('t-thanks').innerText = t.thanks;
        document.getElementById('t-cred-sub').innerText = t.cred_sub;
        // menu dynamic elements
        const menuBtnElem = document.getElementById('menuToggleBtn');
        if(menuBtnElem) menuBtnElem.innerText = t.menuBtn;
        const menuTitleSpan = document.querySelector('.menu-header');
        if(menuTitleSpan) menuTitleSpan.innerText = t.menuTitle;
        const menuHomeElem = document.getElementById('menuHomeAction');
        if(menuHomeElem) menuHomeElem.innerHTML = t.menuHome;
        const menuCreditsElem = document.getElementById('menuCreditsAction');
        if(menuCreditsElem) menuCreditsElem.innerHTML = t.menuCredits;
        const footerCred = document.querySelector('.credits-mini');
        if(footerCred) footerCred.innerText = t.footerCredits;
        localStorage.setItem('ranky_lang', lang);
    }

    function setLanguage(lang) { applyLanguage(lang); }

    // Sidebar menu logic
    const menuBtn = document.getElementById('menuToggleBtn');
    const offcanvas = document.getElementById('offcanvasMenu');
    const overlay = document.getElementById('menuOverlay');
    function openMenu() { offcanvas.classList.add('open'); overlay.classList.add('active'); }
    function closeMenu() { offcanvas.classList.remove('open'); overlay.classList.remove('active'); }
    menuBtn.addEventListener('click', openMenu);
    document.getElementById('closeMenuBtn').addEventListener('click', closeMenu);
    overlay.addEventListener('click', closeMenu);
    // Menu: Home / Clean URL (remove hash/query, go to base)
    document.getElementById('menuHomeAction').addEventListener('click', () => {
        const cleanUrl = window.location.origin + window.location.pathname;
        window.history.replaceState({}, document.title, cleanUrl);
        closeMenu();
        // visual feedback
        const alertDiv = document.getElementById('security-alert');
        if(alertDiv) { alertDiv.innerText = "✓ URL cleaned! No extra parameters."; alertDiv.style.color = "#10b981"; alertDiv.style.display = "block"; setTimeout(()=>alertDiv.style.display="none", 1800); }
    });
    // Credits just show final menu? actually final menu contains credits
    document.getElementById('menuCreditsAction').addEventListener('click', () => {
        closeMenu();
        document.getElementById('finalMenu').style.display = 'flex';
    });

    // Side language buttons
    document.getElementById('langEsSide').addEventListener('click', () => setLanguage('es'));
    document.getElementById('langEnSide').addEventListener('click', () => setLanguage('en'));

    // Telemetry & paste guard
    window.addEventListener('mousemove', () => { mouseTelemetry++; });
    document.querySelectorAll('textarea, input').forEach(el => { el.addEventListener('paste', () => { pasteCount++; }); });

    // captcha loading from config.json (mock or fetch)
    async function loadCaptchaKeys() {
        try {
            const res = await fetch('./config.json');
            const cfg = await res.json();
            return { turnstileKey: cfg.sitekey, recaptchaKey: cfg.recaptchaSitekey };
        } catch(e) {
            // fallback demo keys (public test keys for turnstile / recaptcha)
            return { turnstileKey: "1x00000000000000000000AA", recaptchaKey: "6LeIxAcTAAAAAJcZVRqyHh71UMIEGNQ_MXjiZKhI" };
        }
    }

    function renderTurnstile(sitekey, rcKey) {
        if(turnstileWidget) turnstile.reset(turnstileWidget);
        turnstileWidget = turnstile.render('#turnstile-container', {
            sitekey: sitekey,
            callback: function(token) { captchaToken = token; document.getElementById('t-btn').disabled = false; },
            'error-callback': function() { activateFallback(rcKey); }
        });
    }

    function activateFallback(rcKey) {
        isFallback = true;
        document.getElementById('turnstile-container').style.display = 'none';
        document.getElementById('recaptcha-container').style.display = 'flex';
        grecaptcha.render('recaptcha-container', { sitekey: rcKey, callback: (token) => { captchaToken = token; document.getElementById('t-btn').disabled = false; }, theme: 'light' });
    }

    window.initCaptchas = async () => {
        const keys = await loadCaptchaKeys();
        renderTurnstile(keys.turnstileKey, keys.recaptchaKey);
    };

    // form submission with anti-bot improvements
    document.getElementById('recruitForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const elapsed = (Date.now() - bootTime) / 1000;
        const t = translations[currentLang];
        const warnDiv = document.getElementById('security-alert');
        warnDiv.style.display = 'none';

        if (mouseTelemetry < 8) { warnDiv.innerText = t.err_mouse; warnDiv.style.display = 'block'; return; }
        if (elapsed < 8) { warnDiv.innerText = t.err_speed; warnDiv.style.display = 'block'; return; }
        if (pasteCount > 3) { warnDiv.innerText = t.err_paste; warnDiv.style.display = 'block'; return; }

        const formData = {
            discord: document.getElementById('discord').value,
            email: document.getElementById('email').value,
            role: document.getElementById('role').value,
            software: document.getElementById('software').value,
            age: document.getElementById('age').value,
            hours: document.getElementById('hours').value,
            skill: document.getElementById('skill').value,
            portfolio: document.getElementById('portfolio').value,
            experience: document.getElementById('experience').value,
            motivation: document.getElementById('motivation').value,
            conflict: document.getElementById('conflict').value,
            future: document.getElementById('future').value,
            formLanguage: currentLang,
        };

        const btn = document.getElementById('t-btn');
        btn.disabled = true;
        btn.innerText = "...";

        try {
            const payload = { type: 'form', turnstileToken: captchaToken, isFallback: isFallback, formData: formData };
            const response = await fetch('https://ranky-api.pages.dev/api/api', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
            const data = await response.json();
            if (data.success) {
                document.getElementById('finalMenu').style.display = 'flex';
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } else if (data.blocked) { alert("⛔ Protocol blocked: suspicious activity."); }
            else { alert("Submission error. Try again."); }
        } catch (err) { console.error(err); alert("Network error. Check connection."); }
        finally { btn.disabled = false; btn.innerText = translations[currentLang].btn; }
    });

    // bubble-less design removed, cleaner background

    // load language preference and captcha
    window.onload = () => {
        const savedLang = localStorage.getItem('ranky_lang');
        const browserLang = navigator.language.startsWith('es') ? 'es' : 'en';
        const finalLang = savedLang || browserLang;
        applyLanguage(finalLang);
        initCaptchas();
        // start telemetry baseline
        bootTime = Date.now();
        mouseTelemetry = 0;
        pasteCount = 0;
        // small hint: allow user to interact
    };
</script>
</body>
</html>

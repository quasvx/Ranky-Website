<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RankyQR</title>
    
    <link rel="icon" href="rankyqr.ico" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@700&family=Outfit:wght@300;600&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/gh/ushelp/EasyQRCodeJS@master/dist/easy.qrcode.min.js"></script>

    <style>
        :root {
            --accent: #00b3ff;
            --bg-deep: #020617;
            --glass: rgba(15, 23, 42, 0.75);
            --ios-green: #34c759;
            --ios-blue: #007aff;
            --shiny: rgba(255, 255, 255, 0.4);
        }

        body { 
            margin: 0; padding: 0;
            background-color: var(--bg-deep);
            /* FONDO MEJORADO CON ANIMACIÓN */
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(0, 179, 255, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(99, 102, 241, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, rgba(0, 179, 255, 0.05) 0%, transparent 60%);
            background-size: 200% 200%;
            animation: nebulaMove 15s ease infinite;
            color: white; font-family: 'Outfit', sans-serif; 
            min-height: 100vh; display: flex; justify-content: center; align-items: center;
            overflow-x: hidden;
        }

        @keyframes nebulaMove {
            0% { background-position: 0% 0%; }
            50% { background-position: 100% 100%; }
            100% { background-position: 0% 0%; }
        }

        .card { 
            background: var(--glass); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            padding: 40px; border-radius: 35px; text-align: center; 
            width: 100%; max-width: 420px; border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6); box-sizing: border-box; margin: 20px;
            position: relative; overflow: hidden;
        }

        .item-title { font-family: 'Rajdhani'; color: var(--accent); text-transform: uppercase; margin: 0; font-size: 2.5rem; font-weight: 800; letter-spacing: 1px; }
        .description { font-size: 0.85rem; color: #94a3b8; margin: 10px 0 20px 0; font-style: italic; line-height: 1.4; }

        .controls-group { margin: 20px 0; display: flex; flex-direction: column; gap: 12px; }

        .switch-container { 
            display: flex; align-items: center; justify-content: space-between; 
            background: rgba(255, 255, 255, 0.05); padding: 12px 18px; border-radius: 15px;
            cursor: pointer; transition: 0.3s;
        }
        .switch-container:hover { background: rgba(255, 255, 255, 0.08); }

        .switch-label { font-family: 'Rajdhani'; font-size: 0.85rem; font-weight: 700; text-transform: uppercase; pointer-events: none; }

        input[type="text"] { 
            width: 100%; box-sizing: border-box; padding: 15px; border-radius: 12px; 
            border: 1px solid rgba(255, 255, 255, 0.1); background: rgba(0, 0, 0, 0.4); 
            color: white; margin-bottom: 10px; outline: none; font-family: 'Outfit';
            transition: 0.3s;
        }
        input[type="text"]:focus { border-color: var(--accent); box-shadow: 0 0 10px rgba(0, 179, 255, 0.2); }

        #logo-field { display: none; }

        /* BOTONES CON EFECTO ROTACIÓN Y BRILLO */
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 10px; }
        
        .btn-gen, .btn-down, .btn-back {
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            border: none;
            font-family: 'Rajdhani';
            font-weight: 800;
            text-transform: uppercase;
        }

        .btn-gen:hover, .btn-down:hover, .btn-back:hover {
            transform: rotate(2deg) scale(1.03); /* ROTACIÓN SOLICITADA */
        }

        /* RAYITO DE BRILLO (ANIMACIÓN) */
        .btn-gen::after, .btn-down::after, .btn-back::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -100%;
            width: 50%;
            height: 200%;
            background: linear-gradient(to right, transparent, var(--shiny), transparent);
            transform: rotate(30deg);
            animation: shinySweep 4s infinite;
        }

        @keyframes shinySweep {
            0% { left: -100%; }
            20% { left: 150%; }
            100% { left: 150%; }
        }

        .btn-gen { background: var(--accent); color: #000; grid-column: span 2; padding: 15px; border-radius: 12px; font-size: 1rem; }
        .btn-down { background: white; color: black; display: none; padding: 15px; border-radius: 12px; }
        .btn-back { background: rgba(255, 255, 255, 0.1); color: white; grid-column: span 2; text-decoration: none; padding: 15px; border-radius: 12px; font-size: 0.9rem; text-align: center; }

        #qrcode { margin-top: 25px; background: white; padding: 15px; border-radius: 20px; display: none; justify-content: center; border: 5px solid rgba(255,255,255,0.1); }

        #cors-notice { 
            font-size: 0.75rem; color: #f87171; margin-top: 15px; 
            display: none; line-height: 1.3; font-weight: 300; 
        }

        /* Tri-Switch */
        .tri-switch { position: relative; width: 55px; height: 26px; background: #334155; border-radius: 34px; transition: 0.4s; }
        .tri-slider { position: absolute; height: 20px; width: 20px; left: 3px; bottom: 3px; background-color: white; transition: 0.4s; border-radius: 50%; }
        .tri-switch.state-1 { background-color: var(--ios-blue); }
        .tri-switch.state-1 .tri-slider { transform: translateX(14px); }
        .tri-switch.state-2 { background-color: var(--ios-green); }
        .tri-switch.state-2 .tri-slider { transform: translateX(29px); }

        /* iOS Switch */
        .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #334155; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--ios-green); }
        input:checked + .slider:before { transform: translateX(20px); }

        .lang-switcher { position: fixed; bottom: 30px; right: 30px; display: flex; gap: 10px; z-index: 1000; }
        .lang-btn { background: rgba(15, 23, 42, 0.9); border: 1px solid var(--accent); color: white; padding: 10px 15px; border-radius: 12px; cursor: pointer; font-family: 'Rajdhani'; font-weight: 700; transition: 0.3s; }
        .lang-btn:hover { background: var(--accent); color: black; }
    </style>
</head>
<body>

<div class="card">
    <h1 class="item-title">RankyQR</h1>
    <p class="description" id="t-desc">Official tool of the Ranky FNF Mod!<br>(why did i even do this instead of updating?)</p>
    
    <div class="controls-group">
        <div class="switch-container">
            <span id="mode-label" class="switch-label">MODO: TEXTO</span>
            <label class="switch">
                <input type="checkbox" id="mode-toggle" onchange="updateLabels()">
                <span class="slider"></span>
            </label>
        </div>

        <div class="switch-container" onclick="cycleIconState()">
            <span id="icon-label" class="switch-label">Icon in QR: OFF</span>
            <div class="tri-switch" id="tri-switch">
                <div class="tri-slider"></div>
            </div>
        </div>
    </div>

    <input type="text" id="input-field" placeholder="Escribe algo..." oninput="handleInput()">
    <input type="text" id="logo-field" placeholder="Manual URL (https://...)">
    
    <div class="btn-grid">
        <button id="btn-gen-text" class="btn-gen" onclick="generate()">Generar</button>
        <button id="download-btn" class="btn-down" onclick="download()">Guardar</button>
        <a id="back-btn" href="/" class="btn-back">Vuelve al menú</a>
    </div>

    <p id="cors-notice">Sometimes the icon may not appear due to CORS privacy violations</p>
    
    <div id="qrcode"></div>
</div>

<div class="lang-switcher">
    <button class="lang-btn" onclick="setLanguage('es')">ES</button>
    <button class="lang-btn" onclick="setLanguage('en')">EN</button>
</div>

<script>
    const qrContainer = document.getElementById("qrcode");
    const corsNotice = document.getElementById("cors-notice");
    let iconState = 0; 

    const translations = {
        en: { 
            desc: "Official tool of the Ranky FNF Mod!<br>(why did i even do this instead of updating?)",
            modeText: "MODE: TEXT", modeUrl: "MODE: URL", iconBase: "Icon in QR: ", 
            iconOff: "OFF", iconManual: "MANUAL", iconAuto: "AUTO", 
            placeholder: "Type something...", logoPlaceholder: "Manual URL (https://...)", 
            gen: "Generate", loading: "Processing...", save: "Save", back: "Back to Menu",
            cors: "Sometimes the icon may not appear due to CORS privacy violations"
        },
        es: { 
            desc: "¡Herramienta oficial del Mod Ranky FNF!<br>(¿por qué hice esto en vez de actualizar?)",
            modeText: "MODO: TEXTO", modeUrl: "MODO: URL", iconBase: "Icono en QR: ", 
            iconOff: "OFF", iconManual: "MANUAL", iconAuto: "AUTO", 
            placeholder: "Escribe algo...", logoPlaceholder: "URL manual (https://...)", 
            gen: "Generar", loading: "Procesando...", save: "Guardar", back: "Vuelve al menú",
            cors: "A veces el icono no aparece debido a violaciones de privacidad CORS"
        }
    };

    function setLanguage(lang) {
        localStorage.setItem('rankyLang', lang);
        const t = translations[lang];
        document.getElementById('t-desc').innerHTML = t.desc;
        document.getElementById('btn-gen-text').innerText = t.gen;
        document.getElementById('download-btn').innerText = t.save;
        document.getElementById('back-btn').innerText = t.back;
        document.getElementById('logo-field').placeholder = t.logoPlaceholder;
        document.getElementById('cors-notice').innerText = t.cors;
        updateLabels();
    }

    function cycleIconState() {
        iconState = (iconState + 1) % 3;
        document.getElementById("tri-switch").className = "tri-switch state-" + iconState;
        document.getElementById("logo-field").style.display = (iconState === 1) ? "block" : "none";
        corsNotice.style.display = (iconState > 0) ? "block" : "none";
        updateLabels();
    }

    function updateLabels() {
        const lang = localStorage.getItem('rankyLang') || 'en';
        const t = translations[lang];
        const isUrl = document.getElementById("mode-toggle").checked;
        document.getElementById("mode-label").innerText = isUrl ? t.modeUrl : t.modeText;
        const states = [t.iconOff, t.iconManual, t.iconAuto];
        document.getElementById("icon-label").innerText = t.iconBase + states[iconState];
        document.getElementById("input-field").placeholder = t.placeholder;
    }

    async function smartFetchIcon(domain) {
        const urls = [
            `https://www.google.com/s2/favicons?domain=${domain}&sz=128`,
            `https://${domain}/favicon.ico`
        ];
        for (const url of urls) {
            const res = await new Promise((resolve) => {
                const img = new Image();
                img.crossOrigin = "anonymous"; 
                const timeout = setTimeout(() => resolve(null), 2500);
                img.onload = () => { clearTimeout(timeout); resolve(img.src); };
                img.onerror = () => { clearTimeout(timeout); resolve(null); };
                img.src = url;
            });
            if (res) return res;
        }
        return null;
    }

    async function generate() {
        const genBtn = document.getElementById("btn-gen-text");
        const lang = localStorage.getItem('rankyLang') || 'en';
        const t = translations[lang];
        
        let text = document.getElementById("input-field").value.trim();
        if (text === "") return;
        
        genBtn.innerText = t.loading;
        genBtn.disabled = true;

        let finalLogo = null;
        if (iconState === 1) {
            finalLogo = document.getElementById("logo-field").value.trim();
            if (finalLogo && !finalLogo.startsWith('http')) finalLogo = 'https://' + finalLogo;
        } else if (iconState === 2) {
            let d = text.startsWith("http") ? text : "https://" + text;
            try {
                const u = new URL(d);
                finalLogo = await smartFetchIcon(u.hostname);
            } catch(e) { finalLogo = null; }
        }

        if (document.getElementById("mode-toggle").checked && !text.startsWith("http")) text = "https://" + text;
        
        qrContainer.innerHTML = "";
        qrContainer.style.display = "flex";

        new QRCode(qrContainer, {
            text: text,
            width: 256, height: 256,
            colorDark: "#000000", colorLight: "#ffffff",
            correctLevel: QRCode.CorrectLevel.H,
            logo: finalLogo,
            logoWidth: 60, logoHeight: 60,
            logoBackgroundColor: '#ffffff',
            logoBackgroundTransparent: false,
            logoRadius: 15,
            logoMargin: 4, 
            onRenderingEnd: () => {
                genBtn.innerText = t.gen;
                genBtn.disabled = false;
                document.getElementById("download-btn").style.display = "flex";
                genBtn.style.gridColumn = "span 1";
            }
        });
    }

    function handleInput() {
        if (document.getElementById("input-field").value === "") {
            qrContainer.style.display = "none";
            document.getElementById("download-btn").style.display = "none";
            document.getElementById("btn-gen-text").style.gridColumn = "span 2";
        }
    }

    function download() {
        const canvas = qrContainer.querySelector("canvas");
        if (!canvas) return;
        const link = document.createElement("a");
        link.download = "RankyQR.png";
        try {
            link.href = canvas.toDataURL("image/png");
            link.click();
        } catch(e) {
            const lang = localStorage.getItem('rankyLang') || 'en';
            alert(lang === 'es' ? "Error CORS: Saca una captura." : "CORS Error: Take a screenshot.");
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        const lang = localStorage.getItem('rankyLang') || (navigator.language.includes('es') ? 'es' : 'en');
        setLanguage(lang);
    });
</script>
</body>
</html>

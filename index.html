    <style>
        /* =========================================================
        1. CSS VARIABLES (DESIGN TOKENS)
        =========================================================
        */
        :root {
            --clr-primary: #00b3ff;
            --clr-primary-glow: rgba(0, 179, 255, 0.4);
            --clr-bg: #020617;
            --clr-card: #0f172a;
            --clr-warn: #ffaa44;
            --clr-err: #f43f5e;
            --clr-ok: #10b981;
            --clr-discord: #5865F2;
            
            --font-head: 'Rajdhani', sans-serif;
            --font-body: 'Outfit', sans-serif;
            
            --shadow-glow: 0px 0px 40px rgba(0, 179, 255, 0.2);
            --shadow-heavy: 0px 20px 50px rgba(0, 0, 0, 0.5);
            
            --transition-main: 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        /* =========================================================
        2. GLOBAL ARCHITECTURE
        =========================================================
        */
        * { 
            margin-top: 0px;
            margin-bottom: 0px;
            margin-left: 0px;
            margin-right: 0px;
            padding-top: 0px;
            padding-bottom: 0px;
            padding-left: 0px;
            padding-right: 0px;
            box-sizing: border-box; 
        }

        body { 
            background-color: var(--clr-bg); 
            color: #ffffff; 
            font-family: var(--font-body); 
            min-height: 100vh; 
            overflow: hidden; 
            position: relative;
        }
        
        body.unlocked { 
            overflow-y: auto; 
        }

        /* SCROLLBAR REFINEMENT */
        ::-webkit-scrollbar { 
            width: 8px; 
        }
        
        ::-webkit-scrollbar-track { 
            background: var(--clr-bg); 
        }
        
        ::-webkit-scrollbar-thumb { 
            background: var(--clr-primary); 
            border-radius: 10px; 
        }

        /* =========================================================
        3. PARTICLE ENGINE (MOBILE OPTIMIZED)
        =========================================================
        */
        .particle-container { 
            position: fixed; 
            top: 0px; 
            left: 0px; 
            width: 100%; 
            height: 100%; 
            z-index: 1; 
            pointer-events: none; 
            background: radial-gradient(circle at center, #0f172a 0%, #020617 100%); 
        }
        
        .particle { 
            position: absolute; 
            bottom: -150px; 
            border-radius: 50%; 
            background: linear-gradient(135deg, rgba(0, 179, 255, 0.15), transparent); 
            animation: floatUp linear infinite; 
            will-change: transform, opacity; 
        }
        
        @keyframes floatUp { 
            0% { 
                transform: translateY(0px) scale(1); 
                opacity: 0; 
            } 
            20% { 
                opacity: 0.5; 
            } 
            100% { 
                transform: translateY(-130vh) scale(1.5); 
                opacity: 0; 
            } 
        }

        /* =========================================================
        4. SECURITY LAYER (AUTH VEIL)
        =========================================================
        */
        .auth-overlay { 
            position: fixed; 
            top: 0px; 
            left: 0px; 
            width: 100%; 
            height: 100%; 
            background-color: var(--clr-bg); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            z-index: 10000; 
            transition: opacity 0.8s ease-in-out, visibility 0.8s; 
            opacity: 1;
            visibility: visible;
        }
        
        .auth-overlay.hidden { 
            opacity: 0; 
            visibility: hidden; 
            pointer-events: none; 
        }
        
        .auth-modal { 
            background-color: var(--clr-card); 
            border-top: 2px solid var(--clr-primary); 
            border-bottom: 2px solid var(--clr-primary); 
            border-left: 2px solid var(--clr-primary); 
            border-right: 2px solid var(--clr-primary); 
            padding-top: 50px; 
            padding-bottom: 50px; 
            padding-left: 50px; 
            padding-right: 50px; 
            border-radius: 20px; 
            text-align: center; 
            box-shadow: var(--shadow-glow); 
            width: 90%; 
            max-width: 500px; 
            position: relative;
        }
        
        .ascii-logo { 
            font-family: 'Courier New', Courier, monospace; 
            font-size: 0.75rem; 
            line-height: 1.1; 
            color: var(--clr-primary); 
            white-space: pre; 
            margin-bottom: 30px; 
            font-weight: bold; 
            user-select: none;
        }

        /* =========================================================
        5. DASHBOARD ARCHITECTURE
        =========================================================
        */
        .dashboard-wrapper { 
            position: relative; 
            display: flex; 
            padding-top: 80px; 
            padding-bottom: 80px; 
            padding-left: 5%; 
            padding-right: 5%; 
            z-index: 10; 
            max-width: 1400px; 
            margin-left: auto; 
            margin-right: auto; 
            width: 100%; 
            justify-content: space-between; 
            align-items: flex-start; 
            min-height: 100vh; 
        }
        
        .title-main { 
            font-family: var(--font-head); 
            color: var(--clr-primary); 
            font-size: 5rem; 
            font-weight: 800; 
            text-transform: uppercase; 
            margin-bottom: 20px; 
            line-height: 1; 
            letter-spacing: -1px;
        }
        
        .history-text { 
            color: #94a3b8; 
            font-size: 1.1rem; 
            line-height: 1.8; 
            margin-top: 30px; 
            margin-bottom: 30px; 
            max-width: 550px; 
            border-left: 3px solid var(--clr-primary); 
            padding-left: 20px; 
            text-align: justify;
        }

        /* =========================================================
        6. INTERACTIVE COMPONENTS (BUTTONS)
        =========================================================
        */
        .btn-ui { 
            background-color: rgba(15, 23, 42, 0.7); 
            border-top: 2px solid var(--clr-primary); 
            border-bottom: 2px solid var(--clr-primary); 
            border-left: 2px solid var(--clr-primary); 
            border-right: 2px solid var(--clr-primary); 
            padding-top: 16px; 
            padding-bottom: 16px; 
            padding-left: 24px; 
            padding-right: 24px; 
            color: #ffffff; 
            font-family: var(--font-head); 
            text-transform: uppercase; 
            text-decoration: none; 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            border-radius: 12px; 
            font-weight: 700; 
            transition: var(--transition-main); 
            width: 100%; 
            max-width: 380px; 
            margin-bottom: 15px; 
            cursor: pointer; 
        }
        
        .btn-ui:hover { 
            background-color: var(--clr-primary); 
            color: #000000; 
            transform: translateY(-5px); 
            box-shadow: 0px 10px 20px var(--shadow-glow); 
        }
        
        .btn-discord { 
            background-color: var(--clr-discord); 
            border-color: var(--clr-discord); 
            justify-content: center; 
        }
        
        .btn-warn { 
            border-color: var(--clr-warn); 
            color: var(--clr-warn); 
        }
        
        .btn-warn:hover { 
            background-color: var(--clr-warn); 
            color: #000000; 
        }

        /* =========================================================
        7. MEDIA & HERO SYSTEM
        =========================================================
        */
        .hero-image { 
            border: 3px solid var(--clr-primary); 
            border-radius: 20px; 
            width: 320px; 
            height: 320px; 
            object-fit: cover; 
            box-shadow: var(--shadow-heavy); 
            animation: floatingLogo 6s ease-in-out infinite; 
            transition: var(--transition-main);
        }
        
        @keyframes floatingLogo { 
            0% { transform: translateY(0px); } 
            50% { transform: translateY(-15px); } 
            100% { transform: translateY(0px); }
        }

        .hero-image:hover {
            transform: scale(1.03);
            animation-play-state: paused;
        }

        /* =========================================================
        8. WARNING SYSTEM (MODALS)
        =========================================================
        */
        .warning-modal-wrapper { 
            position: fixed; 
            top: 0px; 
            left: 0px; 
            width: 100%; 
            height: 100%; 
            background-color: rgba(0,0,0,0.95); 
            z-index: 20000; 
            display: none; 
            align-items: center; 
            justify-content: center; 
            backdrop-filter: blur(10px); 
        }
        
        .warning-card { 
            background-color: var(--clr-card); 
            border: 2px solid var(--clr-warn); 
            border-radius: 20px; 
            padding-top: 40px; 
            padding-bottom: 40px; 
            padding-left: 40px; 
            padding-right: 40px; 
            max-width: 500px; 
            width: 90%; 
            text-align: center; 
        }
        
        .timer-badge { 
            width: 70px; 
            height: 70px; 
            border: 3px solid var(--clr-warn); 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            margin-left: auto;
            margin-right: auto;
            margin-bottom: 20px; 
            font-size: 2rem; 
            font-family: var(--font-head); 
            font-weight: bold; 
            color: var(--clr-warn); 
        }

        /* =========================================================
        9. LOCALE CONTROLS
        =========================================================
        */
        .locale-group { 
            position: fixed; 
            bottom: 30px; 
            right: 30px; 
            display: flex; 
            gap: 10px; 
            z-index: 100; 
        }
        
        .btn-locale { 
            background-color: var(--clr-card); 
            border: 1px solid var(--clr-primary); 
            color: #ffffff; 
            padding-top: 8px; 
            padding-bottom: 8px; 
            padding-left: 16px; 
            padding-right: 16px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-family: var(--font-head); 
            font-weight: bold; 
            transition: 0.3s; 
        }
        
        .btn-locale:hover { 
            background-color: var(--clr-primary); 
            color: #000000; 
        }

        /* =========================================================
        10. RESPONSIVE DESIGN
        =========================================================
        */
        @media (max-width: 992px) {
            .dashboard-wrapper { 
                flex-direction: column; 
                align-items: center; 
                text-align: center; 
            }
            .section-right { 
                margin-top: 40px; 
                display: flex; 
                flex-direction: column; 
                align-items: center; 
            }
            .history-text { 
                border-left: none; 
                border-top: 2px solid var(--clr-primary); 
                padding-left: 0px; 
                padding-top: 20px; 
            }
            .locale-group { 
                right: 50%; 
                transform: translateX(50%); 
                bottom: 20px; 
            }
        }
    </style>
</head>

            },
            
            boot() { 
                const saved = localStorage.getItem('ranky_lang_pref'); 
                const nav = navigator.language.startsWith('es'); 
                this.set(saved || (nav ? 'es' : 'en')); 
            }
        };

        /**
         * 5. UI & PARTICLE SYSTEM
         */
        const uiManager = {
            
            renderParticles() {
                const canvas = document.getElementById('particles');
                const count = window.innerWidth < 768 ? 15 : 40;
                
                for(let i=0; i<count; i++) {
                    const node = document.createElement('div'); 
                    node.className = 'particle';
                    
                    const size = Math.random() * 70 + 20; 
                    node.style.width = `${size}px`;
                    node.style.height = `${size}px`;
                    node.style.left = `${Math.random() * 100}%`; 
                    node.style.animationDuration = `${Math.random() * 15 + 10}s`;
                    node.style.animationDelay = `${Math.random() * 8}s`; 
                    
                    canvas.appendChild(node);
                }
            },
            
            liftVeil() { 
                const veil = document.getElementById('auth-veil');
                veil.style.opacity = '0';
                
                setTimeout(() => { 
                    veil.style.display = 'none'; 
                    document.body.classList.add('unlocked'); 
                }, 800);
            },
            
            openWarning(e) {
                if(e) e.preventDefault();
                const modal = document.getElementById('warning-modal');
                const btn = document.getElementById('btn-warning-proceed');
                const timerView = document.getElementById('warning-timer');
                
                let count = 5; 
                modal.style.display = 'flex'; 
                btn.disabled = true; 
                timerView.innerText = count;
                
                const countdown = setInterval(() => { 
                    count--; 
                    timerView.innerText = count; 
                    if(count <= 0) { 
                        clearInterval(countdown); 
                        timerView.innerText = "OK"; 
                        btn.disabled = false; 
                    } 
                }, 1000);
                
                btn.onclick = () => { 
                    window.open("https://shrinkme.click/donateranky1", "_blank"); 
                    this.closeWarning(); 
                };
            },
            
            closeWarning() { 
                document.getElementById('warning-modal').style.display = 'none'; 
            }
        };

        /**
         * 6. SECURITY KERNEL (THE BUNKER)
         * Triple-redundancy check with Turnstile and reCAPTCHA.
         */
        const secKernel = {
            
            strikes: 0, 
            maxStrikes: 3, 
            siteConfig: null,
            
            async processVerify(token, provider = 'turnstile') {
                const status = document.getElementById('auth-status-msg'); 
                const t = DICTIONARY[locManager.activeCode];
                
                status.innerText = t.status_v; 
                status.style.color = "var(--clr-warn)";

                /**
                 * API HANDSHAKE TIMEOUT
                 * Prevents infinite loading if server is unresponsive.
                 */
                const abortControl = new AbortController();
                const timeoutTimer = setTimeout(() => abortControl.abort(), 5000);

                try {
                    const requestBody = { 
                        type: 'verify', 
                        turnstileToken: token, 
                        isFallback: provider === 'recaptcha' 
                    };

                    const response = await fetch('https://ranky-api.pages.dev/api/api', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(requestBody),
                        signal: abortControl.signal
                    });
                    
                    clearTimeout(timeoutTimer);
                    const result = await response.json();

                    if (result.success) {
                        status.innerText = t.status_ok; 
                        status.style.color = "var(--clr-ok)";
                        setTimeout(() => uiManager.liftVeil(), 800);
                    } else {
                        // Handle server-side rejection
                        this.triggerStrike(status, t, provider);
                    }
                } catch (exception) {
                    // EMERGENCY BYPASS (CORS / TIMEOUT / LOCAL TEST)
                    console.warn("Handshake exception. Authorizing emergency access.");
                    status.innerText = t.status_ok; 
                    status.style.color = "var(--clr-ok)";
                    setTimeout(() => uiManager.liftVeil(), 800);
                }
            },

            /**
             * STRIKE SYSTEM
             * Counts fails and manages visual feedback or reload.
             */
            triggerStrike(msgNode, strings, provider) {
                this.strikes++;
                msgNode.style.color = "var(--clr-err)";
                
                if (provider === 'turnstile') {
                    if (this.strikes >= this.maxStrikes) {
                        msgNode.innerText = "OVERLOAD DETECTED. SWITCHING TO BACKUP...";
                        setTimeout(() => this.loadBackupCaptcha(), 1000);
                    } else {
                        msgNode.innerText = `${strings.status_err} (${this.strikes}/3)`;
                        
                        if (window.turnstile) {
                            setTimeout(() => {
                                turnstile.reset();
                                msgNode.innerText = strings.status_v;
                                msgNode.style.color = "var(--clr-warn)";
                            }, 1500);
                        }
                    }
                } else {
                    // reCAPTCHA FAILED - FINAL STATE
                    msgNode.innerText = strings.status_err + ". SYSTEM RELOAD.";
                    setTimeout(() => location.reload(), 2500);
                }
            },

            /**
             * BACKUP RECOVERY
             * Swaps Turnstile for Google reCAPTCHA.
             */
            loadBackupCaptcha() {
                const mountPoint = document.getElementById('security-mount-point'); 
                mountPoint.innerHTML = ''; // Wipe Turnstile
                
                if(window.grecaptcha && this.siteConfig.recaptchaSitekey) {
                    grecaptcha.render(mountPoint, { 
                        'sitekey': this.siteConfig.recaptchaSitekey, 
                        'theme': 'dark', 
                        'callback': (token) => this.processVerify(token, 'recaptcha'),
                        'error-callback': () => {
                             const msg = document.getElementById('auth-status-msg');
                             msg.innerText = "SECURITY ARCHITECTURE FAULT. RELOAD.";
                        }
                    });
                }
            },

            /**
             * BOOTSTRAP SEQUENCE
             */
            boot() {
                fetch('./config.json', { cache: "no-store" })
                    .then(res => res.json())
                    .then(data => {
                        this.siteConfig = data;
                        
                        // Initial render attempt: Turnstile
                        if(window.turnstile && data.sitekey) {
                            turnstile.render('#security-mount-point', { 
                                sitekey: data.sitekey, 
                                theme: 'dark', 
                                callback: (token) => this.processVerify(token, 'turnstile'),
                                'error-callback': () => this.triggerStrike(document.getElementById('auth-status-msg'), DICTIONARY[locManager.activeCode], 'turnstile')
                            });
                        } else { 
                            this.loadBackupCaptcha(); 
                        }
                    })
                    .catch(() => { 
                        // CONFIG FAILURE FALLBACK
                        console.error("Config missing. Initializing emergency unlock.");
                        setTimeout(() => uiManager.liftVeil(), 2000); 
                    });
            }
        };

        /**
         * 7. ENTRY POINT (WINDOW ONLOAD)
         */
        window.onload = () => {
            
            // Render Visuals
            document.getElementById('ascii-container').textContent = ASCII_ART;
            locManager.boot(); 
            uiManager.renderParticles(); 
            
            // Start Security Engine
            secKernel.boot();
            
            // Bind Interactive Events
            const donateBtn = document.getElementById('btn-donate-trigger');
            if (donateBtn) {
                donateBtn.onclick = (e) => uiManager.openWarning(e);
            }
            
        };

    </script>
</body>
</html>
